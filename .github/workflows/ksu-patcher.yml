name: 🚀 GKI Patch & AnyKernel3 Builder

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '🔗 رابط تحميل مباشر لملف boot.img أو init_boot.img'
        required: true
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Image
        run: |
          curl -L -o boot.img "${{ inputs.boot_img_url }}"
          if [ ! -s boot.img ]; then echo "Error: Download failed"; exit 1; fi

      - name: 🔧 Setup & Patch
        run: |
          # تحميل magiskboot
          curl -sL https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk-v27.0.apk -o magisk.apk
          unzip -jq magisk.apk 'lib/x86_64/libmagiskboot.so' -d . && mv libmagiskboot.so magiskboot && chmod +x magiskboot
          
          # فك الملف
          mkdir workspace && mv boot.img workspace/ && cd workspace
          ../magiskboot unpack boot.img
          
          # معالجة ذكية للـ KMI لتجنب خطأ 12.30
          # البحث عن السلسلة الكاملة ثم استخراج 6.12 فقط
          KERNEL_VERSION=$(strings kernel | grep -m1 -oE "Linux version [0-9]+\.[0-9]+\.[0-9]+" | awk '{print $3}' | cut -d. -f1,2)
          ANDROID_VERSION=$(strings kernel | grep -m1 -oE "android[0-9]+")
          KMI="${KERNEL_VERSION}-${ANDROID_VERSION}"
          echo "✅ Detected KMI: $KMI"
          echo "KMI=$KMI" >> $GITHUB_ENV

          # تحميل الـ Patch المضمون من WildKernels
          URL="https://github.com/WildKernels/GKI_KernelSU_SUSFS/releases/latest/download/AnyKernel3-${KMI}.zip"
          echo "⬇️ Downloading: $URL"
          curl -L -o gki_pack.zip "$URL"
          
          # استبدال الـ Image
          unzip -j gki_pack.zip 'Image' -d .
          mv Image kernel
          
          # إعادة التجميع
          ../magiskboot repack boot.img ../patched_boot.img
          cp gki_pack.zip ../Flashable_AnyKernel3.zip
          cd ..

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Patched-Kernel-${{ env.KMI }}
          path: |
            patched_boot.img
            Flashable_AnyKernel3.zip
