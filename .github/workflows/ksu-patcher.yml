name: 🔧 KSU Boot Patcher — Multi Manager + SUSFS

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '🔗 رابط boot.img الاستوك (Direct Link)'
        required: true
        type: string
      gki_source:
        description: '📦 مصدر الـ GKI Kernel (كلهم SUSFS + Multi Manager)'
        required: true
        default: 'WildKernels (WKSU + KSUN)'
        type: choice
        options:
          - 'WildKernels (WKSU + KSUN)'
          - 'zzh20188 (SukiSU + MKSU + KSUN + ReSukiSU)'
          - 'KernelSU-Next (KSUN فقط)'
      include_susfs_module:
        description: '🛡 تحميل SUSFS userspace module'
        required: false
        type: boolean
        default: true
      include_zygisk:
        description: '🔀 تحميل ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false
      include_lsposed:
        description: '🧩 تحميل LSPosed'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:

    - name: 📥 تحميل boot.img
      run: |
        echo "::group::Download boot.img"
        curl -L --progress-bar "${{ inputs.boot_img_url }}" -o boot.img
        echo ""
        ls -lh boot.img
        file boot.img
        # تأكد إن الملف اتحمل صح
        SIZE=$(stat -c%s boot.img)
        if [ "$SIZE" -lt 1000000 ]; then
          echo "::error::الملف صغير جداً ($SIZE bytes) — تأكد من الرابط"
          exit 1
        fi
        echo "::endgroup::"

    - name: 🔧 تجهيز magiskboot
      run: |
        echo "::group::Setup magiskboot"
        MAGISK_APK=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
          | jq -r '.assets[] | select(.name | test("Magisk-v[0-9]")) | .browser_download_url' \
          | head -1)
        curl -sL "$MAGISK_APK" -o magisk.apk
        unzip -jq magisk.apk 'lib/x86_64/libmagiskboot.so' -d .
        mv libmagiskboot.so magiskboot
        chmod +x magiskboot
        echo "✅ magiskboot ready"
        echo "::endgroup::"

    - name: 🔍 استخراج معلومات الكيرنال
      run: |
        echo "::group::Detect kernel version"

        mkdir -p workspace
        cp boot.img workspace/
        cd workspace

        # فك boot.img
        ../magiskboot unpack boot.img
        echo ""
        echo "Files after unpack:"
        ls -lah

        # ── البحث عن ملف الكيرنال بأي اسم ──
        KERNEL_FILE=$(find . -maxdepth 1 \
          \( -name 'kernel' -o -name 'Image' -o -name 'kernel.gz' \
             -o -name 'kernel_dtb' -o -name 'kernel-dtb' \) \
          | head -1)

        if [ -z "$KERNEL_FILE" ]; then
          echo "::error::مش لاقي ملف كيرنال بعد الـ unpack"
          echo "الملفات الموجودة:"
          ls -lah
          exit 1
        fi

        echo "✅ Kernel file: $KERNEL_FILE"
        echo "KERNEL_FILE=$KERNEL_FILE" >> $GITHUB_ENV

        # استخراج معلومات الإصدار
        KERNEL_FULL=$(strings "$KERNEL_FILE" | grep -oP 'Linux version \K[^\s]+' | head -1)
        KERNEL_VER=$(echo "$KERNEL_FULL"  | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+')
        KERNEL_KMI=$(echo "$KERNEL_FULL"  | grep -oP '^[0-9]+\.[0-9]+-android[0-9]+')
        ANDROID_VER=$(echo "$KERNEL_FULL" | grep -oP 'android[0-9]+' | head -1)
        KSHORT=$(echo "$KERNEL_VER" | grep -oP '^[0-9]+\.[0-9]+')

        if [ -z "$KERNEL_KMI" ] && [ -n "$KSHORT" ] && [ -n "$ANDROID_VER" ]; then
          KERNEL_KMI="${KSHORT}-${ANDROID_VER}"
        fi

        echo "KERNEL_FULL=$KERNEL_FULL"   >> $GITHUB_ENV
        echo "KERNEL_VER=$KERNEL_VER"     >> $GITHUB_ENV
        echo "KERNEL_KMI=$KERNEL_KMI"     >> $GITHUB_ENV
        echo "ANDROID_VER=$ANDROID_VER"   >> $GITHUB_ENV
        echo "KSHORT=$KSHORT"             >> $GITHUB_ENV

        echo "Full    : $KERNEL_FULL"
        echo "KMI     : $KERNEL_KMI"
        echo "Android : $ANDROID_VER"
        echo "Short   : $KSHORT"
        echo "::endgroup::"

    - name: 📦 تحديد الـ Repo + Manager APKs
      run: |
        case "${{ inputs.gki_source }}" in
          "WildKernels (WKSU + KSUN)")
            echo "GKI_REPO=WildKernels/GKI_KernelSU_SUSFS"  >> $GITHUB_ENV
            echo "GKI_LABEL=WildKernels"                     >> $GITHUB_ENV
            echo "MGR1_REPO=WildKernels/Wild_KSU"            >> $GITHUB_ENV
            echo "MGR1_NAME=WildKSU_Manager"                 >> $GITHUB_ENV
            echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR2_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            ;;
          "zzh20188 (SukiSU + MKSU + KSUN + ReSukiSU)")
            echo "GKI_REPO=zzh20188/GKI_KernelSU_SUSFS"     >> $GITHUB_ENV
            echo "GKI_LABEL=zzh20188"                        >> $GITHUB_ENV
            echo "MGR1_REPO=SukiSU-Ultra/SukiSU-Ultra"      >> $GITHUB_ENV
            echo "MGR1_NAME=SukiSU_Manager"                  >> $GITHUB_ENV
            echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR2_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            ;;
          "KernelSU-Next (KSUN فقط)")
            echo "GKI_REPO=KernelSU-Next/KernelSU-Next"     >> $GITHUB_ENV
            echo "GKI_LABEL=KSU-Next"                        >> $GITHUB_ENV
            echo "MGR1_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR1_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            echo "MGR2_REPO="                                 >> $GITHUB_ENV
            echo "MGR2_NAME="                                 >> $GITHUB_ENV
            ;;
        esac

    - name: 📥 تحميل GKI Image المتوافق
      run: |
        echo "::group::Find GKI Image from $GKI_REPO"

        RELEASE=$(curl -s "https://api.github.com/repos/$GKI_REPO/releases/latest")
        GKI_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
        echo "GKI_TAG=$GKI_TAG" >> $GITHUB_ENV
        echo "Release: $GKI_TAG"
        echo ""
        echo "Available assets:"
        echo "$RELEASE" | jq -r '.assets[].name'
        echo ""

        ASSET_IS_ZIP=false

        # محاولة 1: KMI كامل
        IMG_URL=$(echo "$RELEASE" | jq -r --arg kmi "$KERNEL_KMI" '
          .assets[]
          | select((.name | contains($kmi)) and (.name | test("Image$|AnyKernel|\\.zip$")))
          | .browser_download_url' | head -1)

        # محاولة 2: رقم قصير
        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "KMI match failed → trying short: $KSHORT"
          IMG_URL=$(echo "$RELEASE" | jq -r --arg k "$KSHORT" '
            .assets[]
            | select((.name | contains($k)) and (.name | test("Image$|AnyKernel|\\.zip$")))
            | .browser_download_url' | head -1)
        fi

        # محاولة 3: أي zip في الـ release
        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "Short match failed → trying any AnyKernel zip"
          IMG_URL=$(echo "$RELEASE" | jq -r '
            .assets[]
            | select(.name | test("AnyKernel.*\\.zip$"))
            | .browser_download_url' | head -1)
          ASSET_IS_ZIP=true
        fi

        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "::error::❌ مفيش image متوافق مع $KERNEL_KMI"
          exit 1
        fi

        echo "ASSET_IS_ZIP=$ASSET_IS_ZIP" >> $GITHUB_ENV
        echo "IMG_URL=$IMG_URL"           >> $GITHUB_ENV
        echo "✅ Found: $(basename $IMG_URL)"
        echo "::endgroup::"

    - name: ⚡ دمج GKI Image في boot.img
      run: |
        echo "::group::Inject GKI Image"

        curl -L --progress-bar "$IMG_URL" -o gki_asset
        echo ""
        file gki_asset
        ls -lh gki_asset

        mkdir -p extracted

        # استخراج الـ Image
        if [ "$ASSET_IS_ZIP" = "true" ] || file gki_asset | grep -q -i 'zip'; then
          echo "Extracting from zip..."
          unzip -l gki_asset | head -20
          unzip -j gki_asset 'Image'    -d extracted/ 2>/dev/null || \
          unzip -j gki_asset '*/Image'  -d extracted/ 2>/dev/null || \
          unzip -j gki_asset 'Image.gz' -d extracted/ 2>/dev/null || {
            echo "::error::فشل استخراج Image من الـ zip"
            exit 1
          }
          GKI_IMAGE=$(find extracted -name 'Image*' | head -1)
        else
          cp gki_asset extracted/Image
          GKI_IMAGE=extracted/Image
        fi

        echo "GKI Image: $(ls -lh $GKI_IMAGE)"
        file "$GKI_IMAGE"

        # لو مضغوط
        if file "$GKI_IMAGE" | grep -q 'gzip'; then
          gunzip -c "$GKI_IMAGE" > extracted/Image_raw
          GKI_IMAGE=extracted/Image_raw
        fi

        # استبدال الكيرنال في الـ workspace
        cd workspace
        KFILE_NAME=$(basename "${{ env.KERNEL_FILE }}")
        cp "../$GKI_IMAGE" "$KFILE_NAME"

        # إعادة تجميع boot.img
        ../magiskboot repack boot.img ../ksu_patched_boot.img
        cd ..

        ls -lh ksu_patched_boot.img
        echo "✅ Done"
        echo "::endgroup::"

    - name: 📲 تحميل Manager APKs
      run: |
        echo "::group::Manager APKs"
        mkdir -p managers

        dl_apk() {
          local REPO="$1" NAME="$2"
          [ -z "$REPO" ] && return
          local URL=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -1)
          if [ -n "$URL" ] && [ "$URL" != "null" ]; then
            curl -sL "$URL" -o "managers/${NAME}.apk" && echo "✅ $NAME"
          else
            echo "⚠️ $NAME not found"
          fi
        }

        dl_apk "$MGR1_REPO" "$MGR1_NAME"
        dl_apk "$MGR2_REPO" "$MGR2_NAME"
        ls -lh managers/
        echo "::endgroup::"

    - name: 🛡 SUSFS Module
      if: inputs.include_susfs_module == 'true'
      run: |
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/sidex15/ksu_module_susfs/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && curl -sL "$URL" -o modules/ksu_module_susfs.zip && echo "✅ SUSFS module"

    - name: 🔀 ZygiskNext + Shamiko
      if: inputs.include_zygisk == 'true'
      run: |
        mkdir -p modules
        ZYGISK=$(curl -s https://api.github.com/repos/Dr-TSNG/ZygiskNext/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$ZYGISK" ] && curl -sL "$ZYGISK" -o modules/ZygiskNext.zip && echo "✅ ZygiskNext"

        SHAMIKO=$(curl -s https://api.github.com/repos/LSPosed/LSPosed.github.io/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ss]hamiko")) | .browser_download_url' | head -1)
        [ -n "$SHAMIKO" ] && curl -sL "$SHAMIKO" -o modules/Shamiko.zip && echo "✅ Shamiko"

    - name: 🧩 LSPosed
      if: inputs.include_lsposed == 'true'
      run: |
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/LSPosed/LSPosed/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ll][Ss][Pp]osed.*[Zz]ygisk")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && curl -sL "$URL" -o modules/LSPosed.zip && echo "✅ LSPosed"

    - name: 📤 رفع boot.img + Managers
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Boot [${{ env.GKI_LABEL }}] [${{ env.KERNEL_KMI }}]
        path: |
          ksu_patched_boot.img
          managers/
        retention-days: 7

    - name: 📤 رفع Modules
      if: inputs.include_susfs_module == 'true' || inputs.include_zygisk == 'true' || inputs.include_lsposed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Modules [${{ env.GKI_LABEL }}]
        path: modules/
        retention-days: 7

    - name: 📋 ملخص
      if: always()
      run: |
        {
          echo "## KSU Boot Patcher"
          echo "| | |"
          echo "|---|---|"
          echo "| GKI Source | \`${{ inputs.gki_source }}\` |"
          echo "| GKI Version | \`$GKI_TAG\` |"
          echo "| Kernel KMI | \`$KERNEL_KMI\` |"
          echo "| Kernel File | \`$KERNEL_FILE\` |"
          echo ""
          echo "### Flash"
          echo '```'
          echo "fastboot flash boot ksu_patched_boot.img"
          echo "fastboot reboot"
          echo '```'
        } >> $GITHUB_STEP_SUMMARY
