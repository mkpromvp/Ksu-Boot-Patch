name: "KSU Boot Patcher - Multi Manager + SUSFS"

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: "Direct link to boot.img or firmware.zip"
        required: true
        type: string
      zip_boot_path:
        description: "Path to boot.img inside ZIP (empty = auto)"
        required: false
        type: string
      gki_source:
        description: "Kernel source"
        required: true
        default: "ReSukiSU+SUSFS"
        type: choice
        options:
          - "WildKernels"
          - "zzh20188"
          - "KernelSU-Next"
          - "Stock-Boot"
          - "ReSukiSU+SUSFS"
      superkey:
        description: "SuperKey for ReSukiSU (empty = auto generate)"
        required: false
        type: string
        default: ""
      include_susfs_module:
        description: "Download SUSFS userspace module"
        required: false
        type: boolean
        default: true
      include_zygisk:
        description: "Download ZygiskNext + Shamiko"
        required: false
        type: boolean
        default: false
      include_lsposed:
        description: "Download LSPosed"
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Download input
        run: |
          set -e
          curl -L --progress-bar "${{ inputs.boot_img_url }}" -o input_file
          ls -lh input_file
          file input_file
          [ "$(stat -c%s input_file)" -ge 1000000 ] || { echo "::error::Input too small"; exit 1; }

      - name: Extract boot.img
        run: |
          set -e
          rm -rf ex
          mkdir -p ex

          if file input_file | grep -qiE 'zip|archive'; then
            if [ -n "${{ inputs.zip_boot_path }}" ]; then
              unzip -j input_file "${{ inputs.zip_boot_path }}" -d ex/ || { echo "::error::zip_boot_path not found"; exit 1; }
            else
              BOOT_PATH=$(unzip -l input_file | awk '{print $4}' \
                | grep -i 'boot\.img$' \
                | grep -ivE 'vendor_boot|init_boot|recovery|vbmeta|super' \
                | head -1 || true)

              if [ -z "$BOOT_PATH" ]; then
                BOOT_PATH=$(unzip -l input_file | awk '{print $4}' | grep -i '^boot' | head -1 || true)
              fi

              [ -n "$BOOT_PATH" ] || { echo "::error::Cannot auto-find boot.img. Use zip_boot_path."; exit 1; }
              unzip -j input_file "$BOOT_PATH" -d ex/
            fi

            IMG_FOUND=$(find ex -type f -name "*.img" | head -1 || true)
            [ -n "$IMG_FOUND" ] || { echo "::error::No img extracted"; exit 1; }
            mv "$IMG_FOUND" boot.img
          else
            mv input_file boot.img
          fi

          file boot.img
          ls -lh boot.img

      - name: Setup magiskboot
        run: |
          set -e
          curl -sL "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk" -o magisk.apk
          if [ "$(stat -c%s magisk.apk)" -lt 100000 ]; then
            APK="$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
              | jq -r '.assets[] | select(.name | test("^Magisk-v[0-9].*\\.apk$")) | .browser_download_url' | head -1)"
            curl -sL "$APK" -o magisk.apk
          fi
          unzip -jq magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Unpack boot and detect kernel
        run: |
          set -e
          mkdir -p workspace out modules managers report
          cp boot.img workspace/
          cd workspace
          ../magiskboot unpack boot.img

          KFILE=$(find . -maxdepth 1 \( -name kernel -o -name Image -o -name kernel.gz -o -name kernel_dtb -o -name kernel-dtb \) | head -1)
          [ -n "$KFILE" ] || { echo "::error::No kernel file found"; exit 1; }

          KTARGET="$KFILE"
          if file "$KFILE" | grep -qiE 'gzip|compressed|lz4|lzma'; then
            ../magiskboot decompress "$KFILE" kfile_dec 2>/dev/null || true
            [ -s kfile_dec ] && KTARGET="kfile_dec"
          fi

          FULL=$(strings "$KTARGET" 2>/dev/null | grep -oP 'Linux version \K[^\s]+' | head -1 || true)
          KVER=$(echo "$FULL" | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          KSHORT=$(echo "$FULL" | grep -oP '^[0-9]+\.[0-9]+' || echo "unknown")
          ANDROID=$(echo "$FULL" | grep -oP 'android[0-9]+' | head -1 || echo "unknown")
          KMI="${KSHORT}-${ANDROID}"

          cd ..
          echo "KFILE=$KFILE" >> "$GITHUB_ENV"
          echo "KVER=$KVER" >> "$GITHUB_ENV"
          echo "KSHORT=$KSHORT" >> "$GITHUB_ENV"
          echo "ANDROID=$ANDROID" >> "$GITHUB_ENV"
          echo "KMI=$KMI" >> "$GITHUB_ENV"

      - name: Select source config
        run: |
          set -e
          case "${{ inputs.gki_source }}" in
            WildKernels)
              echo "SRC_REPO=WildKernels/GKI_KernelSU_SUSFS" >> "$GITHUB_ENV"
              echo "MGR1_REPO=WildKernels/Wild_KSU" >> "$GITHUB_ENV"
              echo "MGR1_NAME=WildKSU_Manager" >> "$GITHUB_ENV"
              echo "MGR2_REPO=KernelSU-Next/KernelSU-Next" >> "$GITHUB_ENV"
              echo "MGR2_NAME=KernelSU-Next_Manager" >> "$GITHUB_ENV"
              ;;
            zzh20188)
              echo "SRC_REPO=zzh20188/GKI_KernelSU_SUSFS" >> "$GITHUB_ENV"
              echo "MGR1_REPO=SukiSU-Ultra/SukiSU-Ultra" >> "$GITHUB_ENV"
              echo "MGR1_NAME=SukiSU_Manager" >> "$GITHUB_ENV"
              echo "MGR2_REPO=KernelSU-Next/KernelSU-Next" >> "$GITHUB_ENV"
              echo "MGR2_NAME=KernelSU-Next_Manager" >> "$GITHUB_ENV"
              ;;
            KernelSU-Next|Stock-Boot)
              echo "SRC_REPO=" >> "$GITHUB_ENV"
              echo "MGR1_REPO=KernelSU-Next/KernelSU-Next" >> "$GITHUB_ENV"
              echo "MGR1_NAME=KernelSU-Next_Manager" >> "$GITHUB_ENV"
              echo "MGR2_REPO=" >> "$GITHUB_ENV"
              echo "MGR2_NAME=" >> "$GITHUB_ENV"
              ;;
            ReSukiSU+SUSFS)
              echo "SRC_REPO=" >> "$GITHUB_ENV"
              echo "MGR1_REPO=SukiSU-Ultra/SukiSU-Ultra" >> "$GITHUB_ENV"
              echo "MGR1_NAME=SukiSU_Manager_Normal" >> "$GITHUB_ENV"
              echo "MGR2_REPO=SukiSU-Ultra/SukiSU-Ultra" >> "$GITHUB_ENV"
              echo "MGR2_NAME=SukiSU_Manager_Spoofed" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Patch kernel (ReSukiSU+SUSFS)
        if: ${{ inputs.gki_source == 'ReSukiSU+SUSFS' }}
        run: |
          set -e
          if [ -n "${{ inputs.superkey }}" ] && [ "${{ inputs.superkey }}" != "" ]; then
            SKEY="${{ inputs.superkey }}"
          else
            SKEY="sukisu$(openssl rand -hex 8)"
          fi
          echo "$SKEY" > superkey.txt
          echo "SUPERKEY=$SKEY" >> "$GITHUB_ENV"

          echo "=== ReSukiSU SuperKey ===" >> report/patch_report.txt
          echo "SuperKey: $SKEY" >> report/patch_report.txt

          # Download KernelPatch tools
          KP_RELEASE=$(curl -s https://api.github.com/repos/bmax121/KernelPatch/releases/latest)
          KPTOOLS_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name | test("kptools.*linux"; "i")) | .browser_download_url' | head -1)
          KPIMG_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name | test("^kpimg")) | .browser_download_url' | head -1)

          [ -n "$KPTOOLS_URL" ] && [ "$KPTOOLS_URL" != "null" ] || { echo "::error::kptools not found"; exit 1; }
          [ -n "$KPIMG_URL" ] && [ "$KPIMG_URL" != "null" ] || { echo "::error::kpimg not found"; exit 1; }

          curl -fL "$KPTOOLS_URL" -o kptools
          curl -fL "$KPIMG_URL" -o kpimg
          chmod +x kptools

          mkdir -p kp_work
          KFILE_CLEAN="${KFILE#./}"
          cp "workspace/$KFILE_CLEAN" kp_work/stock_kernel

          ./magiskboot decompress kp_work/stock_kernel kp_work/stock_kernel_raw 2>/dev/null || true
          [ -s kp_work/stock_kernel_raw ] && mv kp_work/stock_kernel_raw kp_work/stock_kernel

          ./kptools -p \
            --image kp_work/stock_kernel \
            --skey "$SKEY" \
            --kpimg kpimg \
            --out kp_work/patched_kernel

          [ -s kp_work/patched_kernel ] || { echo "::error::patched_kernel not generated"; exit 1; }

          cp kp_work/patched_kernel out/Image

          cd workspace
          cp ../kp_work/patched_kernel "$(basename "$KFILE_CLEAN")"
          ../magiskboot repack boot.img ../patched_boot.img
          cd ..
          [ -s patched_boot.img ] || { echo "::error::patched_boot.img missing"; exit 1; }

      - name: Patch kernel (other sources)
        if: ${{ inputs.gki_source != 'ReSukiSU+SUSFS' }}
        run: |
          set -e
          mkdir -p src_extract

          if [ "${{ inputs.gki_source }}" = "Stock-Boot" ] || [ "${{ inputs.gki_source }}" = "KernelSU-Next" ]; then
            cp "workspace/$KFILE" out/Image
          else
            if file gki_asset | grep -qi zip; then
              unzip -q gki_asset -d src_extract/
              IMG=$(find src_extract -type f \( -name "Image" -o -name "Image.gz" -o -name "Image*" \) | head -1 || true)
            else
              cp gki_asset src_extract/Image
              IMG="src_extract/Image"
            fi
            [ -n "$IMG" ] && [ -s "$IMG" ] || { echo "::error::No kernel Image in asset"; exit 1; }

            if file "$IMG" | grep -qi gzip; then
              gunzip -c "$IMG" > out/Image
            else
              cp "$IMG" out/Image
            fi
          fi

          [ -s out/Image ] || { echo "::error::out/Image missing"; exit 1; }

          cd workspace
          cp ../out/Image "$(basename "$KFILE")"
          ../magiskboot repack boot.img ../patched_boot.img
          cd ..
          [ -s patched_boot.img ] || { echo "::error::patched_boot.img missing"; exit 1; }

      - name: Build AnyKernel3
        run: |
          set -e
          [ -s out/Image ] || { echo "::error::out/Image missing"; exit 1; }

          rm -rf AnyKernel3-master ak3.zip Flashable_AnyKernel3.zip
          curl -fL "https://github.com/osm0sis/AnyKernel3/archive/refs/heads/master.zip" -o ak3.zip
          unzip -q ak3.zip
          AK3="AnyKernel3-master"

          cp out/Image "$AK3/Image"

          perl -0777 -i -pe '
            s/^block=.*/block=boot/m;
            s/^is_slot_device=.*/is_slot_device=auto/m;
            s/^do\.devicecheck=.*/do.devicecheck=0/m;
            s/^do\.modules=.*/do.modules=0/m;
            s/^kernel\.string=.*/kernel.string=KSU Patched by ReSukiSU CI/m;
          ' "$AK3/anykernel.sh"

          (cd "$AK3" && zip -r9 ../Flashable_AnyKernel3.zip . -x ".git/*" ".github/*")
          [ -s Flashable_AnyKernel3.zip ] || { echo "::error::AnyKernel zip not created"; exit 1; }

      - name: Verify SUSFS in kernel
        run: |
          set -e
          SUSFS_KERNEL="no"
          if strings out/Image | grep -Eiq 'susfs|SUSFS|sus_su|ksu_susfs'; then
            SUSFS_KERNEL="yes"
          fi
          echo "SUSFS_KERNEL=$SUSFS_KERNEL" >> "$GITHUB_ENV"

          {
            echo "KSU patch report"
            echo "Source: ${{ inputs.gki_source }}"
            echo "Kernel version: $KVER"
            echo "KMI: $KMI"
            echo "SUSFS in kernel: $SUSFS_KERNEL"
          } > report/patch_report.txt

      - name: Create root boot flasher script
        run: |
          cat > flash_boot_root.sh << 'EOF'
          #!/system/bin/sh
          IMG="$1"
          if [ -z "$IMG" ] || [ ! -f "$IMG" ]; then
            echo "Usage: sh flash_boot_root.sh /path/to/patched_boot.img"
            exit 1
          fi
          SLOT="$(getprop ro.boot.slot_suffix 2>/dev/null || true)"
          for p in /dev/block/by-name/boot${SLOT} /dev/block/bootdevice/by-name/boot${SLOT} /dev/block/by-name/boot /dev/block/bootdevice/by-name/boot; do
            if [ -e "$p" ]; then
              echo "Flashing to: $p"
              dd if="$IMG" of="$p" bs=4096
              sync
              echo "Done. Reboot now."
              exit 0
            fi
          done
          echo "Cannot find boot partition!"
          EOF
          chmod +x flash_boot_root.sh

      - name: Download Manager APKs (non-ReSukiSU)
        if: ${{ inputs.gki_source != 'ReSukiSU+SUSFS' }}
        run: |
          set -e
          mkdir -p managers
          download_apk() {
            local REPO="$1"
            local NAME="$2"
            [ -z "$REPO" ] && return 0
            URL=$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" \
              | jq -r '.assets[] | select(.name|endswith(".apk")) | .browser_download_url' | head -1)
            [ -n "$URL" ] && curl -sL "${URL}" -o "managers/${NAME}.apk"
          }
          download_apk "$MGR1_REPO" "$MGR1_NAME"
          download_apk "$MGR2_REPO" "$MGR2_NAME"

      - name: Setup Java 21 for App Build
        if: ${{ inputs.gki_source == 'ReSukiSU+SUSFS' }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build ReSukiSU manager
        if: ${{ inputs.gki_source == 'ReSukiSU+SUSFS' }}
        run: |
          set -e

          rm -rf resukisu_src
          mkdir -p managers

          git clone --depth 1 https://github.com/ReSukiSU/ReSukiSU resukisu_src

          cd resukisu_src

          echo "==== Searching for gradlew ===="
          GRADLEW_PATH=$(find . -type f -name gradlew | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "::error::gradlew not found"
            exit 1
          fi

          echo "Found: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"

          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          cd "$GRADLE_DIR"

          echo "==== Building APK ===="

          if ./gradlew assembleRelease; then
            echo "Build success: assembleRelease"
          elif ./gradlew :app:assembleRelease; then
            echo "Build success: app module"
          else
            echo "Trying fallback build"
            ./gradlew build
          fi

          cd ..

          echo "==== Searching for APK ===="
          APK=$(find . -type f -name "*release*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "::error::APK not found"
            exit 1
          fi

          echo "APK: $APK"

          cp "$APK" ../managers/ReSukiSU_Manager.apk

          cd ..

      - name: Download SUSFS module
        if: ${{ inputs.include_susfs_module }}
        run: |
          set -e
          mkdir -p modules
          URL=$(curl -s https://api.github.com/repos/sidex15/ksu_module_susfs/releases/latest \
            | jq -r '.assets[] | select(.name|endswith(".zip")) | .browser_download_url' | head -1)
          curl -sL "${URL:-https://github.com/sidex15/ksu_module_susfs/releases/download/v1.5.1/ksu_module_susfs_v1.5.1.zip}" -o modules/ksu_module_susfs.zip
          echo "SUSFS_MODULE=yes" >> "$GITHUB_ENV"

      - name: Download ZygiskNext + Shamiko
        if: ${{ inputs.include_zygisk }}
        run: |
          set -e
          mkdir -p modules
          curl -sL "https://github.com/Dr-TSNG/ZygiskNext/releases/latest/download/ZygiskNext-v1.1.0.zip" -o modules/ZygiskNext.zip
          curl -sL "https://github.com/LSPosed/LSPosed.github.io/releases/latest/download/Shamiko-v1.1.1.zip" -o modules/Shamiko.zip

      - name: Download LSPosed
        if: ${{ inputs.include_lsposed }}
        run: |
          set -e
          mkdir -p modules
          curl -sL "https://github.com/LSPosed/LSPosed/releases/latest/download/LSPosed-v1.9.2-mod.zip" -o modules/LSPosed.zip

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: "KSU [${{ inputs.gki_source }}] [${{ env.KMI }}]"
          path: |
            patched_boot.img
            Flashable_AnyKernel3.zip
            flash_boot_root.sh
            managers/
            superkey.txt
            report/patch_report.txt
          retention-days: 7

      - name: Upload modules artifact
        if: ${{ inputs.include_susfs_module || inputs.include_zygisk || inputs.include_lsposed }}
        uses: actions/upload-artifact@v4
        with:
          name: "KSU-Modules [${{ inputs.gki_source }}]"
          path: modules/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          cat > "$GITHUB_STEP_SUMMARY" << EOF
          ## KSU Boot Patcher Result

          | Property                  | Value |
          |---------------------------|-------|
          | Source                    | ${{ inputs.gki_source }} |
          | Kernel Version            | ${{ env.KVER }} |
          | KMI                       | ${{ env.KMI }} |
          | SUSFS in Kernel           | ${{ env.SUSFS_KERNEL }} |
          | SuperKey                  | ${{ env.SUPERKEY }} |
          | ReSukiSU Spoofed APK      | ${{ env.RESUKISU_SPOOFED_FOUND }} |
          EOF
