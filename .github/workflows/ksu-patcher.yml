name: 🔧 KSU Boot Patcher (No Magisk / SUSFS)

on:
  workflow_dispatch:
    inputs:

      boot_img_url:
        description: '🔗 رابط boot.img (Direct Download Link)'
        required: true
        type: string

      ksu_variant:
        description: '📦 KSU Manager — (SUSFS متاح في Next و SukiSU فقط)'
        required: true
        default: 'SukiSU-Ultra'
        type: choice
        options:
          - KernelSU-Next
          - SukiSU-Ultra
          - KernelSU

      ksu_version:
        description: '📌 إصدار KSU (اتركه فاضي = أحدث إصدار)'
        required: false
        type: string

      multi_manager:
        description: '🔀 Multi Manager — ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false

      include_susfs_module:
        description: '🛡 تضمين SUSFS userspace module (للـ Next و SukiSU فقط)'
        required: false
        type: boolean
        default: true

      include_lsposed:
        description: '🧩 تضمين LSPosed'
        required: false
        type: boolean
        default: false

# ══════════════════════════════════════════════════════
jobs:
  patch-boot:
    runs-on: ubuntu-latest

    steps:

    # ────────────────────────────────────────────────────
    - name: 🔍 Validate — SUSFS Warning for KernelSU Official
    # ────────────────────────────────────────────────────
      if: inputs.ksu_variant == 'KernelSU' && inputs.include_susfs_module == 'true'
      run: |
        echo "::warning::⚠️ KernelSU (official) prebuilts لا تدعم SUSFS بشكل رسمي."
        echo "::warning::   استخدم KernelSU-Next أو SukiSU-Ultra للحصول على SUSFS كامل."

    # ────────────────────────────────────────────────────
    - name: 📥 Download boot.img
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::Downloading boot.img"
        curl -L --progress-bar "${{ inputs.boot_img_url }}" -o boot.img
        echo ""
        ls -lh boot.img
        file boot.img
        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: 🔧 Install Tools (No Magisk)
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::Installing unpack tools"
        sudo apt-get update -qq
        sudo apt-get install -y python3-pip lz4 xz-utils cpio file jq
        # AOSP mkbootimg tools — بديل magiskboot خالص
        pip install mkbootimg --quiet
        echo "✅ mkbootimg (AOSP) installed"
        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: 📦 Set KSU Repo
    # ────────────────────────────────────────────────────
      run: |
        case "${{ inputs.ksu_variant }}" in
          "KernelSU")       echo "KSU_REPO=tiann/KernelSU"                   >> $GITHUB_ENV ;;
          "KernelSU-Next")  echo "KSU_REPO=KernelSU-Next/KernelSU-Next"      >> $GITHUB_ENV ;;
          "SukiSU-Ultra")   echo "KSU_REPO=SukiSU-Ultra/SukiSU-Ultra"        >> $GITHUB_ENV ;;
        esac

    # ────────────────────────────────────────────────────
    - name: 📥 Fetch KSU Release
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::Fetching ${{ inputs.ksu_variant }} release"

        if [ -n "${{ inputs.ksu_version }}" ]; then
          API="https://api.github.com/repos/$KSU_REPO/releases/tags/${{ inputs.ksu_version }}"
        else
          API="https://api.github.com/repos/$KSU_REPO/releases/latest"
        fi

        RELEASE=$(curl -sf "$API")
        if [ -z "$RELEASE" ]; then
          echo "::error::فشل تحميل الـ release — تأكد من الإصدار أو الـ repo"
          exit 1
        fi

        KSU_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
        echo "KSU_TAG=$KSU_TAG" >> $GITHUB_ENV
        echo "Release: $KSU_TAG"

        # ── ksud x86_64 Linux (الأداة الرئيسية — بديل magiskboot) ──
        KSUD_URL=$(echo "$RELEASE" | jq -r '
          .assets[]
          | select(.name | test("x86_64.*(linux|musl)"; "i"))
          | .browser_download_url' | head -1)

        if [ -z "$KSUD_URL" ]; then
          # محاولة ثانية باسم مختلف
          KSUD_URL=$(echo "$RELEASE" | jq -r '
            .assets[]
            | select(.name | test("ksud.*linux|linux.*ksud"; "i"))
            | .browser_download_url' | head -1)
        fi

        if [ -n "$KSUD_URL" ]; then
          echo "Downloading ksud: $KSUD_URL"
          curl -sL "$KSUD_URL" -o ksud
          chmod +x ksud
          ./ksud --version 2>/dev/null && echo "✅ ksud ready" || true
          echo "HAVE_KSUD=true" >> $GITHUB_ENV
        else
          echo "::warning::ksud x86_64 binary غير موجود في الـ release"
          echo "HAVE_KSUD=false" >> $GITHUB_ENV
        fi

        # ── Manager APK ──
        APK_URL=$(echo "$RELEASE" | jq -r '
          .assets[]
          | select(.name | endswith(".apk"))
          | .browser_download_url' | head -1)

        if [ -n "$APK_URL" ]; then
          curl -sL "$APK_URL" -o "KSUManager_${{ inputs.ksu_variant }}.apk"
          echo "✅ Manager APK: $(ls -lh KSUManager_*.apk | awk '{print $5, $9}')"
        fi

        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: ⚡ Patch boot.img — ksud only (No Magisk)
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::Patching with ksud"

        if [ "$HAVE_KSUD" = "true" ]; then
          # الطريقة المثالية: ksud boot-patch مباشر
          echo "Using: ksud boot-patch"
          ./ksud boot-patch -b boot.img -o ksu_patched_boot.img

        else
          # Fallback بدون magiskboot: unpack_bootimg (AOSP) + GKI prebuilt
          echo "⚠️ Falling back to AOSP unpack_bootimg"

          # فك الـ boot.img
          mkdir -p bootimg_unpacked
          unpack_bootimg --boot_img boot.img --out bootimg_unpacked/

          # اعرف إصدار الكيرنال من ملف kernel
          KERNEL_FILE=$(find bootimg_unpacked -name 'kernel' | head -1)
          if [ -z "$KERNEL_FILE" ]; then
            echo "::error::مش لاقي ملف kernel جوا boot.img"
            exit 1
          fi

          KERNEL_SHORT=$(strings "$KERNEL_FILE" | grep -oP 'Linux version \K[0-9]+\.[0-9]+' | head -1)
          echo "Kernel version short: $KERNEL_SHORT"

          # دور على GKI prebuilt من الـ release
          RELEASE=$(curl -sf "https://api.github.com/repos/$KSU_REPO/releases/latest")
          IMG_URL=$(echo "$RELEASE" | jq -r --arg k "$KERNEL_SHORT" '
            .assets[]
            | select(
                (.name | contains($k)) and
                (.name | test("Image|\\.zip$"))
              )
            | .browser_download_url' | head -1)

          if [ -n "$IMG_URL" ]; then
            curl -sL "$IMG_URL" -o gki_asset
            if file gki_asset | grep -q 'Zip'; then
              unzip -j gki_asset 'Image' -d bootimg_unpacked/ 2>/dev/null || \
              unzip -j gki_asset '*/Image' -d bootimg_unpacked/ 2>/dev/null
            else
              mv gki_asset bootimg_unpacked/kernel
            fi
            echo "✅ Replaced kernel with KSU GKI prebuilt ($KERNEL_SHORT)"
          else
            echo "::error::مفيش GKI prebuilt لـ kernel $KERNEL_SHORT في الـ release"
            echo "::error::جرب KernelSU-Next أو SukiSU-Ultra، أو حدّد إصدار KSU أحدث"
            exit 1
          fi

          # إعادة تجميع boot.img
          # اعرف معلومات الـ boot من الـ unpack output
          CMDLINE=$(cat bootimg_unpacked/kernel_cmdline 2>/dev/null || true)
          mkbootimg \
            --kernel bootimg_unpacked/kernel \
            --ramdisk bootimg_unpacked/ramdisk \
            --output ksu_patched_boot.img \
            ${CMDLINE:+--cmdline "$CMDLINE"} \
            || {
              echo "::error::فشلت إعادة التجميع — بيانات boot.img ناقصة"
              exit 1
            }
        fi

        echo ""
        ls -lh ksu_patched_boot.img
        echo "✅ Patch done"
        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: 🛡 Download SUSFS Userspace Module
      if: inputs.include_susfs_module == 'true' && inputs.ksu_variant != 'KernelSU'
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::SUSFS Module"
        mkdir -p modules

        # susfs4ksu — الـ userspace companion لـ SUSFS kernel patch
        SUSFS_REL=$(curl -s https://api.github.com/repos/sidex15/susfs4ksu-module/releases/latest 2>/dev/null)
        SUSFS_URL=$(echo "$SUSFS_REL" | jq -r '
          .assets[]
          | select(.name | endswith(".zip"))
          | .browser_download_url' | head -1)

        if [ -n "$SUSFS_URL" ] && [ "$SUSFS_URL" != "null" ]; then
          curl -sL "$SUSFS_URL" -o modules/susfs4ksu.zip
          echo "✅ susfs4ksu $(echo "$SUSFS_REL" | jq -r '.tag_name')"
        else
          echo "::warning::تعذّر تحميل susfs4ksu — تحقق يدوياً من https://github.com/sidex15/susfs4ksu-module"
        fi

        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: 🔀 Multi Manager — ZygiskNext + Shamiko
      if: inputs.multi_manager == 'true'
    # ────────────────────────────────────────────────────
      run: |
        echo "::group::Multi Manager Modules"
        mkdir -p modules

        # ── ZygiskNext ──
        ZYGISK_REL=$(curl -s https://api.github.com/repos/Dr-TSNG/ZygiskNext/releases/latest)
        ZYGISK_URL=$(echo "$ZYGISK_REL" | jq -r '
          .assets[]
          | select(.name | endswith(".zip"))
          | .browser_download_url' | head -1)
        if [ -n "$ZYGISK_URL" ] && [ "$ZYGISK_URL" != "null" ]; then
          curl -sL "$ZYGISK_URL" -o modules/ZygiskNext.zip
          echo "✅ ZygiskNext $(echo "$ZYGISK_REL" | jq -r '.tag_name')"
        else
          echo "::warning::ZygiskNext غير متاح"
        fi

        # ── Shamiko ──
        SHAMIKO_REL=$(curl -s https://api.github.com/repos/LSPosed/LSPosed.github.io/releases/latest)
        SHAMIKO_URL=$(echo "$SHAMIKO_REL" | jq -r '
          .assets[]
          | select(.name | test("[Ss]hamiko"))
          | .browser_download_url' | head -1)
        if [ -n "$SHAMIKO_URL" ] && [ "$SHAMIKO_URL" != "null" ]; then
          curl -sL "$SHAMIKO_URL" -o modules/Shamiko.zip
          echo "✅ Shamiko downloaded"
        else
          echo "::warning::Shamiko غير متاح"
        fi

        echo "::endgroup::"

    # ────────────────────────────────────────────────────
    - name: 🧩 LSPosed
      if: inputs.include_lsposed == 'true'
    # ────────────────────────────────────────────────────
      run: |
        mkdir -p modules
        LSPOSED_REL=$(curl -s https://api.github.com/repos/LSPosed/LSPosed/releases/latest)
        LSPOSED_URL=$(echo "$LSPOSED_REL" | jq -r '
          .assets[]
          | select(.name | test("[Ll][Ss][Pp]osed.*[Zz]ygisk"))
          | .browser_download_url' | head -1)
        if [ -n "$LSPOSED_URL" ] && [ "$LSPOSED_URL" != "null" ]; then
          curl -sL "$LSPOSED_URL" -o modules/LSPosed.zip
          echo "✅ LSPosed $(echo "$LSPOSED_REL" | jq -r '.tag_name')"
        else
          echo "::warning::LSPosed غير متاح"
        fi

    # ────────────────────────────────────────────────────
    - name: 📤 Upload — Patched Boot + APK
    # ────────────────────────────────────────────────────
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Boot [${{ inputs.ksu_variant }}] [${{ env.KSU_TAG }}]
        path: |
          ksu_patched_boot.img
          KSUManager_*.apk
        retention-days: 7

    - name: 📤 Upload — Modules
      if: inputs.multi_manager == 'true' || inputs.include_susfs_module == 'true' || inputs.include_lsposed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Modules [${{ inputs.ksu_variant }}]
        path: modules/
        retention-days: 7

    # ────────────────────────────────────────────────────
    - name: 📋 Summary
    # ────────────────────────────────────────────────────
      if: always()
      run: |
        SUSFS_NOTE=""
        if [ "${{ inputs.ksu_variant }}" = "KernelSU" ]; then
          SUSFS_NOTE=" ⚠️ (KernelSU official لا يدعم SUSFS في الـ prebuilts)"
        fi

        {
          echo "## ✅ KSU Boot Patcher — Done"
          echo ""
          echo "| | |"
          echo "|---|---|"
          echo "| 📦 Variant | \`${{ inputs.ksu_variant }}\` |"
          echo "| 🏷 Version | \`$KSU_TAG\` |"
          echo "| 🛡 SUSFS Module | \`${{ inputs.include_susfs_module }}\`$SUSFS_NOTE |"
          echo "| 🔀 Multi Manager | \`${{ inputs.multi_manager }}\` |"
          echo "| 🧩 LSPosed | \`${{ inputs.include_lsposed }}\` |"
          echo ""
          echo "### 📱 Flash Order"
          echo '```'
          echo "1. adb reboot bootloader"
          echo "2. fastboot flash boot ksu_patched_boot.img"
          echo "3. fastboot reboot"
          echo "4. Install KSUManager.apk"
          if [ "${{ inputs.multi_manager }}" = "true" ]; then
            echo "5. KSU Manager → Flash ZygiskNext.zip"
            echo "6. KSU Manager → Flash Shamiko.zip"
          fi
          if [ "${{ inputs.include_susfs_module }}" = "true" ]; then
            echo "7. KSU Manager → Flash susfs4ksu.zip"
          fi
          echo "8. Reboot"
          echo '```'
        } >> $GITHUB_STEP_SUMMARY
