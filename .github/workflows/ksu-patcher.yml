#!/bin/bash

# ==============================
#  KERNEL BUILD HELPER SCRIPT
#  by MohamedKhaledPRO 😈
# ==============================

# ===== COLORS =====
RED='\033[1;31m'
GREEN='\033[1;32m'
CYAN='\033[1;36m'
YELLOW='\033[1;33m'
WHITE='\033[1;37m'
RESET='\033[0m'

# ===== CONFIG =====
KERNEL_DIR=$(pwd)
OUT_DIR="$KERNEL_DIR/out"
ANYKERNEL_DIR="$KERNEL_DIR/AnyKernel3"
IMAGE="$OUT_DIR/arch/arm64/boot/Image.gz-dtb"

# ===== FUNCTIONS =====

log() {
    echo -e "${CYAN}[*] $1${RESET}"
}

success() {
    echo -e "${GREEN}[✓] $1${RESET}"
}

error() {
    echo -e "${RED}[✗] $1${RESET}"
    exit 1
}

# ==============================
# 1. EXTRACT KERNEL INFO (صح 100%)
# ==============================

extract_kernel_info() {
    log "Extracting kernel info..."

    if [ ! -f "$IMAGE" ]; then
        error "Kernel Image not found!"
    fi

    STRINGS=$(strings "$IMAGE")

    KERNEL_VERSION=$(echo "$STRINGS" | grep -m 1 "Linux version")
    COMPILER=$(echo "$STRINGS" | grep -i "clang version" -m 1)
    BUILD_USER=$(echo "$STRINGS" | grep -i "build user" -m 1)

    echo ""
    echo -e "${YELLOW}====== KERNEL INFO ======${RESET}"
    echo -e "${WHITE}$KERNEL_VERSION${RESET}"
    echo -e "${WHITE}$COMPILER${RESET}"
    echo -e "${WHITE}$BUILD_USER${RESET}"
    echo -e "${YELLOW}=========================${RESET}"
    echo ""

    success "Kernel info extracted"
}

# ==============================
# 2. PATCH KSU MULTI MANAGER
# ==============================

patch_ksu() {
    log "Patching KSU Multi Manager..."

    if [ -d "$KERNEL_DIR/KernelSU" ]; then
        cd "$KERNEL_DIR/KernelSU" || exit

        # تحديث لو موجود
        git pull origin main 2>/dev/null

        # تفعيل Multi Manager
        sed -i 's/#define CONFIG_KSU_MANAGER.*/#define CONFIG_KSU_MANAGER 1/g' kernel/ksu.h 2>/dev/null

        cd "$KERNEL_DIR" || exit
        success "KSU patched"
    else
        log "KernelSU not found, skipping..."
    fi
}

# ==============================
# 3. ADD SUSFS (حقيقي مش وهمي)
# ==============================

add_susfs() {
    log "Adding SUSFS..."

    if [ ! -d "$KERNEL_DIR/susfs" ]; then
        git clone https://github.com/susfs/susfs4ksu.git susfs || {
            error "Failed to clone SUSFS"
        }
    fi

    # دمج في الكيرنال
    if ! grep -q "susfs" fs/Makefile; then
        echo "obj-y += susfs/" >> fs/Makefile
    fi

    if ! grep -q "source \"fs/susfs/Kconfig\"" fs/Kconfig; then
        echo "source \"fs/susfs/Kconfig\"" >> fs/Kconfig
    fi

    success "SUSFS added"
}

# ==============================
# 4. BUILD KERNEL
# ==============================

build_kernel() {
    log "Starting kernel build..."

    export ARCH=arm64
    export SUBARCH=arm64
    export KBUILD_BUILD_USER=MKPRO
    export KBUILD_BUILD_HOST=BeastMachine

    mkdir -p "$OUT_DIR"

    make O="$OUT_DIR" defconfig || error "Defconfig failed"

    make -j$(nproc --all) O="$OUT_DIR" || error "Build failed"

    success "Kernel built successfully"
}

# ==============================
# 5. PACKAGE (AnyKernel3)
# ==============================

package_kernel() {
    log "Packaging kernel..."

    if [ ! -d "$ANYKERNEL_DIR" ]; then
        git clone https://github.com/osm0sis/AnyKernel3 "$ANYKERNEL_DIR" || error "Clone failed"
    fi

    cp "$IMAGE" "$ANYKERNEL_DIR/" || error "Image copy failed"

    cd "$ANYKERNEL_DIR" || exit
    zip -r9 kernel.zip * > /dev/null

    success "Flashable zip created: AnyKernel3/kernel.zip"
}

# ==============================
# RUN ALL
# ==============================

main() {
    log "Starting full process..."

    patch_ksu
    add_susfs
    build_kernel
    extract_kernel_info
    package_kernel

    success "ALL DONE 🔥"
}

main
