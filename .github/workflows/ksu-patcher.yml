name: 🚀 GKI Patch & AnyKernel3 Builder

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '🔗 رابط تحميل مباشر لملف boot.img'
        required: true
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download & Setup
        run: |
          curl -L -o boot.img "${{ inputs.boot_img_url }}"
          curl -L -o magiskboot https://github.com/topjohnwu/Magisk/raw/master/prebuilt/lib/x86_64/libmagiskboot.so
          chmod +x magiskboot

      - name: 🔧 Patch & Build
        run: |
          mkdir workspace && mv boot.img workspace/ && cd workspace
          ../magiskboot unpack boot.img
          
          # استخراج الـ KMI وتصحيح الصيغة لتطابق المطور
          # السكربت السابق كان يخرج 12.30، سنقوم بإضافة 6. ليصبح 6.12.30
          KMI_RAW=$(strings kernel | grep -m1 -oE "[0-9]+\.[0-9]+\.[0-9]+-android[0-9]+")
          KMI="6.${KMI_RAW}"
          echo "✅ Corrected KMI: $KMI"
          
          # رابط تحميل الملف الصحيح من الإصدار v2.0.0-r20
          URL="https://github.com/WildKernels/GKI_KernelSU_SUSFS/releases/download/v2.0.0-r20/AnyKernel3-${KMI}-2025-07-AnyKernel3.zip"
          echo "⬇️ Downloading: $URL"
          curl -L -o gki_pack.zip "$URL"
          
          # فك وتجميع
          unzip -j gki_pack.zip 'Image' -d .
          mv Image kernel
          ../magiskboot repack boot.img ../patched_boot.img
          cp gki_pack.zip ../Flashable_AnyKernel3.zip

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Patched-Kernel-Result
          path: |
            patched_boot.img
            Flashable_AnyKernel3.zip
