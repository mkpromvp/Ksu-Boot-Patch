name: KSU Boot Patcher

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: "Direct download URL for stock boot.img"
        required: true
        type: string

      gki_source:
        description: "GKI kernel source"
        required: true
        type: choice
        default: "zzh20188"
        options:
          - WildKernels
          - zzh20188
          - KernelSU-Next

      manager_target:
        description: "Target manager compatibility"
        required: true
        type: choice
        default: "ReSukiSU"
        options:
          - ReSukiSU
          - Auto

      susfs_base_url:
        description: "Optional SUSFS release base URL override"
        required: false
        type: string
        default: ""

      include_susfs_module:
        description: "Download ksu_module_susfs"
        required: false
        type: boolean
        default: true

      include_zygisk:
        description: "Download ZygiskNext and Shamiko"
        required: false
        type: boolean
        default: false

      include_lsposed:
        description: "Download LSPosed"
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget unzip jq python3 lz4 zstd xz-utils file

      - name: Download magiskboot
        run: |
          set -euo pipefail
          wget -q "https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk-v28.0.apk" -O magisk.apk
          unzip -q magisk.apk 'lib/x86_64/libmagiskboot.so' -d magisk_tmp
          cp magisk_tmp/lib/x86_64/libmagiskboot.so ./magiskboot
          chmod +x ./magiskboot
          rm -rf magisk.apk magisk_tmp

      - name: Download stock boot.img
        run: |
          set -euo pipefail
          wget -q --show-progress "${{ inputs.boot_img_url }}" -O boot.img
          test -s boot.img
          ls -lh boot.img

      - name: Unpack boot and detect kernel version
        run: |
          set -euo pipefail
          mkdir -p kwork
          cp boot.img kwork/
          cd kwork
          ../magiskboot unpack boot.img

          if [ ! -f kernel ]; then
            echo "ERROR: kernel was not extracted from boot image"
            exit 1
          fi

          KERNEL_VER=$(strings kernel | grep -m1 "Linux version" | awk '{print $3}' | cut -d'-' -f1)
          if [ -z "${KERNEL_VER:-}" ]; then
            echo "ERROR: could not detect Linux version from boot kernel"
            exit 1
          fi

          MAJOR=$(echo "$KERNEL_VER" | cut -d'.' -f1)
          MINOR=$(echo "$KERNEL_VER" | cut -d'.' -f2)

          case "$MAJOR.$MINOR" in
            6.12) KMI="6.12-android16" ;;
            6.6) KMI="6.6-android15" ;;
            6.1) KMI="6.1-android14" ;;
            5.15) KMI="5.15-android13" ;;
            5.10) KMI="5.10-android12" ;;
            *)
              echo "ERROR: unsupported kernel major/minor: $MAJOR.$MINOR"
              exit 1
              ;;
          esac

          {
            echo "KERNEL_FULL_VER=$KERNEL_VER"
            echo "KERNEL_MAJOR=$MAJOR"
            echo "KERNEL_MINOR=$MINOR"
            echo "KMI=$KMI"
          } >> "$GITHUB_ENV"

          echo "Detected kernel version: $KERNEL_VER"
          echo "Detected KMI: $KMI"

      - name: Resolve SUSFS release
        run: |
          set -euo pipefail

          REQUIRE_ZZH=false
          if [ "${{ inputs.manager_target }}" = "ReSukiSU" ]; then
            REQUIRE_ZZH=true
            if [ "${{ inputs.gki_source }}" != "zzh20188" ]; then
              echo "ERROR: ReSukiSU mode requires gki_source=zzh20188"
              exit 1
            fi
          fi

          if [ -n "${{ inputs.susfs_base_url }}" ]; then
            BASE="${{ inputs.susfs_base_url }}"
            REPO=$(echo "$BASE" | sed -E 's#https://github.com/([^/]+/[^/]+)/releases/download/.+#\1#')
            TAG=$(echo "$BASE" | sed -E 's#.+/releases/download/([^/]+)$#\1#')
            if [ -z "${REPO:-}" ] || [ -z "${TAG:-}" ]; then
              echo "ERROR: invalid susfs_base_url format"
              exit 1
            fi
            {
              echo "SUSFS_BASE=$BASE"
              echo "SUSFS_REPO=$REPO"
              echo "SUSFS_TAG=$TAG"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          case "${{ inputs.gki_source }}" in
            WildKernels)
              PRIMARY_REPO="WildKernels/GKI_KernelSU_SUSFS"
              SECONDARY_REPO=""
              ;;
            zzh20188)
              PRIMARY_REPO="zzh20188/GKI_KernelSU_SUSFS"
              SECONDARY_REPO="WildKernels/GKI_KernelSU_SUSFS"
              ;;
            KernelSU-Next)
              PRIMARY_REPO="WildKernels/GKI_KernelSU_SUSFS"
              SECONDARY_REPO=""
              ;;
            *)
              echo "ERROR: unknown gki_source: ${{ inputs.gki_source }}"
              exit 1
              ;;
          esac

          KMI="${{ env.KMI }}"
          KVER="${{ env.KERNEL_FULL_VER }}"

          resolve_from_repo() {
            local repo="$1"
            local out
            out=$(curl -sf "https://api.github.com/repos/${repo}/releases?per_page=25" | jq -r --arg kmi "$KMI" --arg kver "$KVER" --arg repo "$repo" '
              .[] as $rel
              | ($rel.assets // [])[]?
              | select(.name | test("(?i)\\.zip$"))
              | select(
                  if $kmi == "6.12-android16" then test("(?i)(6\\.12|android16)")
                  elif $kmi == "6.6-android15" then test("(?i)(6\\.6|android15)")
                  elif $kmi == "6.1-android14" then test("(?i)(6\\.1|android14)")
                  elif $kmi == "5.15-android13" then test("(?i)(5\\.15|android13)")
                  elif $kmi == "5.10-android12" then test("(?i)(5\\.10|android12)")
                  else false end
                )
              | {
                  tag: $rel.tag_name,
                  repo: $repo,
                  name: .name,
                  url: .browser_download_url,
                  score: (
                    (if (.name | test($kver)) then 100 else 0 end)
                    + (if (.name | test("(?i)android16|android15|android14|android13|android12")) then 5 else 0 end)
                  )
                }
            ' | jq -s 'sort_by(.score) | reverse | .[0] // empty')
            echo "$out"
          }

          BEST="$(resolve_from_repo "$PRIMARY_REPO")"

          if [ -z "$BEST" ] || [ "$BEST" = "null" ]; then
            if [ -n "$SECONDARY_REPO" ]; then
              if [ "$REQUIRE_ZZH" = "true" ]; then
                echo "ERROR: ReSukiSU mode requires zzh20188 assets only, but no matching zzh asset was found."
                echo "Hint: set susfs_base_url manually to a known zzh release tag."
                exit 1
              fi
              echo "Primary source has no matching asset, trying fallback: $SECONDARY_REPO"
              BEST="$(resolve_from_repo "$SECONDARY_REPO")"
            fi
          fi

          if [ -z "$BEST" ] || [ "$BEST" = "null" ]; then
            echo "ERROR: No SUSFS base found for KMI=$KMI. Set susfs_base_url input."
            exit 1
          fi

          REPO=$(echo "$BEST" | jq -r '.repo')
          TAG=$(echo "$BEST" | jq -r '.tag')
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          {
            echo "SUSFS_REPO=$REPO"
            echo "SUSFS_TAG=$TAG"
            echo "SUSFS_BASE=$BASE"
            echo "SUSFS_ASSET_NAME=$(echo "$BEST" | jq -r '.name')"
            echo "SUSFS_ASSET_URL=$(echo "$BEST" | jq -r '.url')"
          } >> "$GITHUB_ENV"

          echo "Resolved release: $REPO @ $TAG"
          echo "Selected asset: $(echo "$BEST" | jq -r '.name')"

      - name: Download and extract matching kernel image
        run: |
          set -euo pipefail
          mkdir -p kp_work

          URL="${{ env.SUSFS_ASSET_URL }}"
          NAME="${{ env.SUSFS_ASSET_NAME }}"

          if [ -z "${URL:-}" ] || [ -z "${NAME:-}" ]; then
            echo "ERROR: no asset URL selected"
            exit 1
          fi

          wget -q --show-progress "$URL" -O "kp_work/$NAME"

          cd kp_work
          unzip -q "$NAME" -d unpack

          # Search common kernel filenames in AnyKernel3 packages.
          KFILE=$(find unpack -type f \( -iname "Image" -o -iname "Image.gz" -o -iname "Image.lz4" -o -iname "kernel" \) | head -n1)
          if [ -z "${KFILE:-}" ]; then
            echo "ERROR: no kernel image found in downloaded package"
            find unpack -maxdepth 3 -type f | sed 's#^# - #' || true
            exit 1
          fi

          cp "$KFILE" ../kwork/new_kernel
          echo "Kernel payload extracted from: $KFILE"

      - name: Replace kernel in boot image and repack
        run: |
          set -euo pipefail
          cd kwork

          file -b new_kernel || true

          if file new_kernel | grep -qi 'LZ4'; then
            lz4 -d -f new_kernel kernel
          elif file new_kernel | grep -qi 'gzip compressed'; then
            gunzip -c new_kernel > kernel
          else
            cp new_kernel kernel
          fi

          ../magiskboot repack boot.img
          cp new-boot.img ../ksu_patched_boot.img
          ls -lh ../ksu_patched_boot.img

      - name: Download manager APKs
        run: |
          set -euo pipefail
          mkdir -p managers

          wget -q "https://github.com/WildKernels/Wild_KSU/releases/latest/download/WildKSU_Manager.apk" -O managers/WildKSU_Manager.apk || true
          wget -q "https://github.com/KernelSU-Next/KernelSU-Next/releases/latest/download/KernelSU_Next_Manager.apk" -O managers/KernelSU_Next_Manager.apk || true
          wget -q "https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases/latest/download/SukiSU_Ultra_Manager.apk" -O managers/SukiSU_Ultra_Manager.apk || true

          # ReSukiSU manager is distributed via nightly/actions, not stable GitHub releases.
          cat > managers/ReSukiSU_Manager_Source.txt << 'EOF'
          ReSukiSU manager download guide:
          https://resukisu.github.io/guide/install.html

          If manager_target=ReSukiSU, use the nightly/action build linked in the guide.
          EOF

          - name: Download optional modules
          run: |
          set -euo pipefail
          mkdir -p modules

          if [ "${{ inputs.include_susfs_module }}" = "true" ]; then
            curl -fsSL "https://api.github.com/repos/sidex15/ksu_module_susfs/releases/latest" \
              | jq -r '.assets[] | select(.name|test("(?i)zip$")) | .browser_download_url' \
              | head -n1 \
              | xargs -r wget -q -O modules/ksu_module_susfs.zip
          fi

          if [ "${{ inputs.include_zygisk }}" = "true" ]; then
            curl -fsSL "https://api.github.com/repos/Dr-TSNG/ZygiskNext/releases/latest" \
              | jq -r '.assets[] | select(.name|test("(?i)zip$")) | .browser_download_url' \
              | head -n1 \
              | xargs -r wget -q -O modules/ZygiskNext.zip

            curl -fsSL "https://api.github.com/repos/LSPosed/LSPosed.github.io/releases/latest" \
              | jq -r '.assets[] | select(.name|test("(?i)shamiko.*zip$")) | .browser_download_url' \
              | head -n1 \
              | xargs -r wget -q -O modules/Shamiko.zip
          fi

          if [ "${{ inputs.include_lsposed }}" = "true" ]; then
            curl -fsSL "https://api.github.com/repos/LSPosed/LSPosed/releases/latest" \
              | jq -r '.assets[] | select(.name|test("(?i)zygisk.*zip$")) | .browser_download_url' \
              | head -n1 \
              | xargs -r wget -q -O modules/LSPosed.zip
          fi

      - name: Upload patched boot and managers
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Boot
          path: |
            ksu_patched_boot.img
            managers/*

      - name: Upload optional modules
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Modules
          path: modules/*
          if-no-files-found: ignore
