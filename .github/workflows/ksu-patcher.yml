name: 🔧 KSU Boot Patcher — Multi Manager + SUSFS

on:
  workflow_dispatch:
    inputs:

      boot_img_url:
        description: '🔗 رابط boot.img أو firmware.zip (Direct Link)'
        required: true
        type: string

      zip_boot_path:
        description: '📂 مسار boot.img جوا الـ ZIP — اتركه فاضي لو ملف boot مباشر (مثال: images/boot.img)'
        required: false
        type: string

      gki_source:
        description: '📦 GKI Kernel source'
        required: true
        default: 'WildKernels (WKSU + KSUN)'
        type: choice
        options:
          - 'WildKernels (WKSU + KSUN)'
          - 'zzh20188 (SukiSU + MKSU + KSUN + ReSukiSU)'
          - 'KernelSU-Next (KSUN only)'

      include_susfs_module:
        description: '🛡 Download SUSFS userspace module'
        required: false
        type: boolean
        default: true

      include_zygisk:
        description: '🔀 Download ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false

      include_lsposed:
        description: '🧩 Download LSPosed'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:

    # ────────────────────────────────────────────
    - name: 📥 Download input file
    # ────────────────────────────────────────────
      run: |
        echo "::group::Download"
        curl -L --progress-bar "${{ inputs.boot_img_url }}" -o input_file
        echo ""
        ls -lh input_file
        file input_file
        SIZE=$(stat -c%s input_file)
        if [ "$SIZE" -lt 1000000 ]; then
          echo "::error::File too small (${SIZE} bytes) — check your link"
          exit 1
        fi
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 📦 Extract boot.img (Direct / ZIP / Payload.bin)
    # ────────────────────────────────────────────
      run: |
        echo "::group::Extract boot.img"
        FILE_TYPE=$(file input_file)
        echo "File type: $FILE_TYPE"

        mkdir -p extracted_rom

        if echo "$FILE_TYPE" | grep -qi 'zip\|archive'; then
          echo "→ ZIP detected, analyzing contents..."

          # 1. لو المستخدم كاتب مسار يدوي جوه الـ ZIP
          if [ -n "${{ inputs.zip_boot_path }}" ]; then
            echo "Using specified path: ${{ inputs.zip_boot_path }}"
            unzip -j input_file "${{ inputs.zip_boot_path }}" -d extracted_rom/ || {
              echo "::error::Path '${{ inputs.zip_boot_path }}' not found in ZIP"
              exit 1
            }
            BOOT_FILE=$(find extracted_rom -name '*.img' | head -1)

          # 2. لو مفيش مسار يدوي، بندور تلقائي على boot.img مباشر جوه الـ ZIP
          else
            BOOT_PATH=$(unzip -l input_file \
              | awk '{print $4}' \
              | grep -i 'boot\.img$' \
              | grep -v 'vendor_boot\|init_boot\|recovery\|vbmeta' \
              | head -1)

            if [ -n "$BOOT_PATH" ]; then
              echo "Found direct boot.img inside ZIP at: $BOOT_PATH"
              unzip -j input_file "$BOOT_PATH" -d extracted_rom/
              BOOT_FILE=$(find extracted_rom -name '*.img' | head -1)
            fi
          fi

          # 3. لو ملحقناش ملف boot.img مباشر، معناها ده Recovery ROM وجواه payload.bin
          if [ -z "$BOOT_FILE" ] || [ ! -s "$BOOT_FILE" ]; then
            PAYLOAD_PATH=$(unzip -l input_file | awk '{print $4}' | grep -i 'payload\.bin$' | head -1)
            
            if [ -n "$PAYLOAD_PATH" ]; then
              echo "💡 Recovery ROM detected (payload.bin found). Extracting boot.img..."
              
              # استخراج ملف payload.bin فقط لتوفير الوقت والمساحة
              unzip -j input_file "$PAYLOAD_PATH" -d .
              
              # تحميل أداة payload-dumper-go الذكية
              curl -sL https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz | tar -xvz
              chmod +x payload-dumper-go
              
              # استخراج الـ boot.img فقط من الـ payload وتوجيهه لمجلد الفك
              ./payload-dumper-go -p boot -o extracted_rom payload.bin
              BOOT_FILE=$(find extracted_rom -name 'boot.img' | head -1)
            fi
          fi

          # إذا فشلت كل المحاولات ولم نجد شيء
          if [ -z "$BOOT_FILE" ] || [ ! -s "$BOOT_FILE" ]; then
            echo "::error::Cannot find boot.img or payload.bin inside the provided ZIP file."
            exit 1
          fi

          mv "$BOOT_FILE" boot.img
          echo "✅ Extracted boot.img successfully"

        else
          echo "→ Direct boot.img file provided"
          mv input_file boot.img
        fi

        ls -lh boot.img
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 🔧 Setup magiskboot
    # ────────────────────────────────────────────
      run: |
        echo "::group::magiskboot"
        MAGISK_APK=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
          | jq -r '.assets[] | select(.name | test("Magisk-v[0-9]")) | .browser_download_url' \
          | head -1)
        curl -sL "$MAGISK_APK" -o magisk.apk
        unzip -jq magisk.apk 'lib/x86_64/libmagiskboot.so' -d .
        mv libmagiskboot.so magiskboot
        chmod +x magiskboot
        echo "✅ ready"
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 🔍 Detect kernel version & GKI Verification
    # ────────────────────────────────────────────
      run: |
        echo "::group::Detect kernel version"
        set +e

        mkdir -p workspace
        cp boot.img workspace/
        cd workspace
        ../magiskboot unpack boot.img
        echo ""

        KERNEL_FILE=$(find . -maxdepth 1 \( -name 'kernel' -o -name 'Image' -o -name 'kernel.gz' \) | head -1)

        if [ -z "$KERNEL_FILE" ]; then
          echo "::error::❌ Cannot find kernel file after unpack."
          exit 1
        fi

        ../magiskboot decompress "$KERNEL_FILE" kernel_decompressed 2>/dev/null
        if [ -s kernel_decompressed ]; then
          TARGET_FILE="kernel_decompressed"
        else
          TARGET_FILE="$KERNEL_FILE"
        fi

        # 1. لقط سطر الـ Linux version بالكامل
        KERNEL_FULL=$(strings "$TARGET_FILE" | grep -E "Linux version [0-9]+\.[0-9]+" | head -1)
        
        if [ -z "$KERNEL_FULL" ]; then
          KERNEL_FULL=$(strings "$TARGET_FILE" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+-android[0-9]+-[0-9]+" | head -1)
        fi

        echo "Full Line Detected: $KERNEL_FULL"

        # 2. استخراج النسخة القصيرة (مثال: 6.12 أو 5.10)
        KSHORT=$(echo "$KERNEL_FULL" | grep -oE "Linux version [0-9]+\.[0-9]+" | awk '{print $3}' || echo "")
        [ -z "$KSHORT" ] && KSHORT=$(echo "$KERNEL_FULL" | grep -oE "[0-9]+\.[0-9]+" | head -1)

        # 3. استخراج نسخة الأندرويد (مثال: android16 أو android12)
        ANDROID_VER=$(echo "$KERNEL_FULL" | grep -oE "android[0-9]+" | head -1)

        # 4. بناء الـ KMI الحقيقي المعتمد في ريبوهات الـ GKI
        KERNEL_KMI="${KSHORT}-${ANDROID_VER}"

        # استخراج الـ KMI التفصيلي بالرقم الفرعي لو موجود (مثال: 6.12.30-android16-5)
        KERNEL_KMI_FULL=$(echo "$KERNEL_FULL" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+-android[0-9]+-[0-9]+" | head -1)
        [ -z "$KERNEL_KMI_FULL" ] && KERNEL_KMI_FULL=$KERNEL_KMI

        # جدار الحماية (GKI Safety Gate) لضمان عدم تمرير كيرنال قديم
        MAJOR=$(echo "$KSHORT" | cut -d. -f1)
        MINOR=$(echo "$KSHORT" | cut -d. -f2)
        
        if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ "$MAJOR" -lt 5 ] || { [ "$MAJOR" -eq 5 ] && [ "$MINOR" -lt 10 ]; }; then
          echo ""
          echo ":::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::"
          echo "::error::❌ CRITICAL ERROR: This device uses a Non-GKI kernel ($KSHORT)."
          echo "Replacing the kernel with a Generic GKI image WILL HARD BRICK THIS DEVICE!"
          echo "Aborting build for device safety."
          echo ":::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::"
          exit 1
        fi

        echo "📊 Final Extraction Results:"
        echo "============================="
        echo "Short Version: $KSHORT"
        echo "Android Ver  : $ANDROID_VER"
        echo "GKI KMI Base : $KERNEL_KMI"
        echo "Full KMI Spec: $KERNEL_KMI_FULL"
        echo "============================="

        echo "KERNEL_FULL=$KERNEL_FULL"       >> $GITHUB_ENV
        echo "KERNEL_KMI=$KERNEL_KMI"         >> $GITHUB_ENV
        echo "KERNEL_KMI_FULL=$KERNEL_KMI_FULL" >> $GITHUB_ENV
        echo "ANDROID_VER=$ANDROID_VER"       >> $GITHUB_ENV
        echo "KSHORT=$KSHORT"                 >> $GITHUB_ENV
        echo "KERNEL_FILE=$KERNEL_FILE"       >> $GITHUB_ENV

        set -e
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 📦 Set GKI repo + Managers
    # ────────────────────────────────────────────
      run: |
        case "${{ inputs.gki_source }}" in
          "WildKernels (WKSU + KSUN)")
            echo "GKI_REPO=WildKernels/GKI_KernelSU_SUSFS"  >> $GITHUB_ENV
            echo "GKI_LABEL=WildKernels"                     >> $GITHUB_ENV
            echo "MGR1_REPO=WildKernels/Wild_KSU"            >> $GITHUB_ENV
            echo "MGR1_NAME=WildKSU_Manager"                 >> $GITHUB_ENV
            echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR2_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            ;;
          "zzh20188 (SukiSU + MKSU + KSUN + ReSukiSU)")
            echo "GKI_REPO=zzh20188/GKI_KernelSU_SUSFS"     >> $GITHUB_ENV
            echo "GKI_LABEL=zzh20188"                        >> $GITHUB_ENV
            echo "MGR1_REPO=SukiSU-Ultra/SukiSU-Ultra"      >> $GITHUB_ENV
            echo "MGR1_NAME=SukiSU_Manager"                  >> $GITHUB_ENV
            echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR2_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            ;;
          "KernelSU-Next (KSUN only)")
            echo "GKI_REPO=KernelSU-Next/KernelSU-Next"     >> $GITHUB_ENV
            echo "GKI_LABEL=KSU-Next"                        >> $GITHUB_ENV
            echo "MGR1_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV
            echo "MGR1_NAME=KernelSU-Next_Manager"           >> $GITHUB_ENV
            echo "MGR2_REPO="                                 >> $GITHUB_ENV
            echo "MGR2_NAME="                                 >> $GITHUB_ENV
            ;;
        esac

    # ────────────────────────────────────────────
    - name: 📥 Find matching GKI Image
    # ────────────────────────────────────────────
      run: |
        echo "::group::Fetch GKI from $GKI_REPO"
        set +e

        RELEASE=$(curl -s "https://api.github.com/repos/$GKI_REPO/releases/latest")
        GKI_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
        echo "GKI_TAG=$GKI_TAG" >> $GITHUB_ENV
        echo "Release : $GKI_TAG"
        echo ""

        IMG_URL=""

        # محاولة البحث بالـ KMI الذكي (وجود نسخة الكيرنال والاندرويد معاً في اسم الملف)
        if [ -n "$KSHORT" ] && [ -n "$ANDROID_VER" ]; then
          IMG_URL=$(echo "$RELEASE" | jq -r \
            --arg a "$ANDROID_VER" --arg k "$KSHORT" '
            .assets[]
            | select(
                (.name | contains($a)) and
                (.name | contains($k)) and
                (.name | test("AnyKernel|Image|\\.zip$"))
              )
            | .browser_download_url' | head -1 || true)
        fi

        # محاولة ثانية بالنسخة القصيرة فقط لو المطور مش كاتب اسم نظام الأندرويد في الـ Zip
        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "Pass 1 failed → trying short version match: $KSHORT"
          IMG_URL=$(echo "$RELEASE" | jq -r --arg k "$KSHORT" '
            .assets[]
            | select(
                (.name | contains($k)) and
                (.name | test("AnyKernel|Image|\\.zip$"))
              )
            | .browser_download_url' | head -1 || true)
        fi

        # محاولة أخيرة (Fallback) لأي ملف AnyKernel3 موجود
        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "Pass 2 failed → fallback to first AnyKernel zip found"
          IMG_URL=$(echo "$RELEASE" | jq -r '
            .assets[]
            | select(.name | test("AnyKernel.*\\.zip$"))
            | .browser_download_url' | head -1 || true)
        fi

        if [ -z "$IMG_URL" ] || [ "$IMG_URL" = "null" ]; then
          echo "::error::❌ No matching GKI kernel image found in the repository for $KSHORT ($ANDROID_VER)"
          exit 1
        fi

        echo "IMG_URL=$IMG_URL"           >> $GITHUB_ENV
        echo "✅ Selected Asset: $(basename $IMG_URL)"
        set -e
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: ⚡ Inject GKI Image into boot.img
    # ────────────────────────────────────────────
      run: |
        echo "::group::Inject"

        curl -L --progress-bar "$IMG_URL" -o gki_asset
        echo ""

        mkdir -p extracted_gki

        # فحص حقيقي لنوع الملف بغض النظر عن المتغيرات السابقة
        if file gki_asset | grep -qi 'zip\|archive'; then
          echo "→ GKI Asset is a ZIP archive (AnyKernel3 format detected)"
          
          # محاولة استخراج الكيرنال بكافة مسمياته الشائعة عند المطورين
          unzip -j gki_asset 'Image'       -d extracted_gki/ 2>/dev/null || \
          unzip -j gki_asset '*/Image'     -d extracted_gki/ 2>/dev/null || \
          unzip -j gki_asset 'kernel'      -d extracted_gki/ 2>/dev/null || \
          unzip -j gki_asset 'Image.gz*'   -d extracted_gki/ 2>/dev/null || {
            echo "::error::❌ Failed to find a valid Kernel Image inside the AnyKernel3 ZIP"
            exit 1
          }
          GKI_IMAGE=$(find extracted_gki -type f \( -name 'Image*' -o -name 'kernel' \) | head -1)
        else
          echo "→ GKI Asset is a raw/direct binary image"
          cp gki_asset extracted_gki/Image
          GKI_IMAGE=extracted_gki/Image
        fi

        echo "Selected GKI Kernel Binary: $GKI_IMAGE"

        # فك ضغط الكيرنال المجلوب لو كان مضغوطاً لحقنه صافي
        if file "$GKI_IMAGE" | grep -qi 'gzip'; then
          echo "→ Decompressing downloaded GKI kernel (GZIP detected)..."
          gunzip -c "$GKI_IMAGE" > extracted_gki/Image_raw
          GKI_IMAGE=extracted_gki/Image_raw
        fi

        cd workspace
        # استبدال الكيرنال القديم بالجديد مع الحفاظ على نفس الاسم الأصلي للـ Boot
        cp "../$GKI_IMAGE" "$(basename $KERNEL_FILE)"
        
        echo "Repacking boot.img..."
        ../magiskboot repack boot.img ../ksu_patched_boot.img
        cd ..

        echo ""
        ls -lh ksu_patched_boot.img
        echo "✅ Replacement & Repack Complete"
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 📲 Download Manager APKs
    # ────────────────────────────────────────────
      run: |
        echo "::group::Managers"
        mkdir -p managers

        dl_apk() {
          local REPO="$1" NAME="$2"
          [ -z "$REPO" ] && return
          local URL
          URL=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' \
            | head -1 || true)
          [ -n "$URL" ] && [ "$URL" != "null" ] \
            && curl -sL "$URL" -o "managers/${NAME}.apk" \
            && echo "✅ $NAME" \
            || echo "⚠️  $NAME not found"
        }

        dl_apk "$MGR1_REPO" "$MGR1_NAME"
        dl_apk "$MGR2_REPO" "$MGR2_NAME"
        ls -lh managers/
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 🛡 SUSFS Module
      if: inputs.include_susfs_module == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/sidex15/ksu_module_susfs/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && [ "$URL" != "null" ] \
          && curl -sL "$URL" -o modules/ksu_module_susfs.zip && echo "✅ SUSFS" \
          || echo "⚠️  not found"

    # ────────────────────────────────────────────
    - name: 🔀 ZygiskNext + Shamiko
      if: inputs.include_zygisk == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        Z=$(curl -s https://api.github.com/repos/Dr-TSNG/ZygiskNext/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$Z" ] && curl -sL "$Z" -o modules/ZygiskNext.zip && echo "✅ ZygiskNext"
        S=$(curl -s https://api.github.com/repos/LSPosed/LSPosed.github.io/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ss]hamiko")) | .browser_download_url' | head -1)
        [ -n "$S" ] && curl -sL "$S" -o modules/Shamiko.zip && echo "✅ Shamiko"

    # ────────────────────────────────────────────
    - name: 🧩 LSPosed
      if: inputs.include_lsposed == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/LSPosed/LSPosed/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ll][Ss][Pp]osed.*[Zz]ygisk")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && curl -sL "$URL" -o modules/LSPosed.zip && echo "✅ LSPosed"

    # ────────────────────────────────────────────
    - name: 📤 Upload — Boot + Managers
    # ────────────────────────────────────────────
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Boot [${{ env.GKI_LABEL }}] [${{ env.KERNEL_KMI }}]
        path: |
          ksu_patched_boot.img
          managers/
        retention-days: 7

    - name: 📤 Upload — Modules
      if: inputs.include_susfs_module == 'true' || inputs.include_zygisk == 'true' || inputs.include_lsposed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: KSU-Modules [${{ env.GKI_LABEL }}]
        path: modules/
        retention-days: 7

    # ────────────────────────────────────────────
    - name: 📋 Summary
    # ────────────────────────────────────────────
      if: always()
      run: |
        cat << 'EOF' >> $GITHUB_STEP_SUMMARY
        ## 🔧 KSU Boot Patcher (Automated GKI Swapper)

        > ⚠️ **ملحوظة للأمان:** هذا السكريبت يستبدل الكيرنال بالكامل بكيرنال GKI جاهز مسبقاً، ولا يقوم بعملية دمج أو تعديل يدوي للأكواد داخلياً.

        | | |
        |---|---|
        | GKI Source | `${{ inputs.gki_source }}` |
        | GKI Version | `$GKI_TAG` |
        | Kernel KMI Base | `$KERNEL_KMI` |
        | Kernel Full Spec | `$KERNEL_KMI_FULL` |
        | Android Version | `$ANDROID_VER` |

        ### Flash
        ```bash
        adb reboot bootloader
        fastboot flash boot ksu_patched_boot.img
        fastboot reboot
        ```

        ### Restore stock
        ```bash
        fastboot flash boot stock_boot.img
        fastboot reboot
        ```

        ### Managers (install any or both)
        EOF

        [ -n "$MGR1_NAME" ] && echo "- \`${MGR1_NAME}.apk\`" >> $GITHUB_STEP_SUMMARY
        [ -n "$MGR2_NAME" ] && echo "- \`${MGR2_NAME}.apk\`" >> $GITHUB_STEP_SUMMARY

        cat << 'EOF' >> $GITHUB_STEP_SUMMARY

        ### Module flash order
        1. ksu_module_susfs.zip
        2. ZygiskNext.zip
        3. Shamiko.zip
        4. LSPosed.zip
        5. Reboot
        EOF
