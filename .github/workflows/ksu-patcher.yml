name: 🔥 Build Kernel - KSU Multi Manager + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clone Kernel Source
      run: |
        git clone https://github.com/YOUR_KERNEL_REPO kernel
        cd kernel

    - name: ⚙️ Setup Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential curl flex git libssl-dev python3

    - name: 📦 Clone Toolchains
      run: |
        git clone https://github.com/llvm/llvm-project --depth=1 clang
        export PATH=$PWD/clang/bin:$PATH

    # =========================
    # 🔥 KernelSU Multi Manager Patch
    # =========================
    - name: 🔥 Apply KSU Multi Manager
      run: |
        cd kernel

        echo "➡️ Cloning KSU Next (Multi Manager support)"
        git clone https://github.com/KernelSU-Next/KernelSU

        echo "➡️ Injecting into kernel"
        cp -r KernelSU/kernel/* .

        echo "➡️ Enable Multi Manager"
        sed -i 's/#define CONFIG_KSU/#define CONFIG_KSU/g' KernelSU/kernel/ksu.h
        sed -i 's/#define CONFIG_KSU_MANAGER/#define CONFIG_KSU_MANAGER/g' KernelSU/kernel/ksu.h

        echo "➡️ Patch for multi manager compatibility"
        echo '#define KSU_MULTI_MANAGER 1' >> KernelSU/kernel/ksu.h

    # =========================
    # 💀 Add SUSFS
    # =========================
    - name: 💀 Add SUSFS
      run: |
        cd kernel

        git clone https://gitlab.com/simonpunk/susfs4ksu

        cp -r susfs4ksu/kernel_patches/* .

        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/defconfig

    # =========================
    # 🧠 Fix & Extract Kernel Info (PRO LEVEL)
    # =========================
    - name: 🧠 Extract Kernel Info (Professional)
      run: |
        cd kernel

        echo "===== Kernel Info ====="

        echo "➡️ Kernel Version:"
        make kernelversion

        echo "➡️ Compiler Info:"
        clang --version | head -n 1

        echo "➡️ Defconfig:"
        export DEFCONFIG=$(ls arch/arm64/configs | head -n 1)
        echo $DEFCONFIG

        echo "➡️ Device Name Guess:"
        grep -r "CONFIG_ARCH_" arch/arm64/configs/$DEFCONFIG || true

        echo "➡️ Build User:"
        echo "builder@github"

        echo "➡️ Build Host:"
        echo "github-actions"

    # =========================
    # ⚙️ Build Kernel
    # =========================
    - name: ⚙️ Build Kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$PWD/../clang/bin:$PATH

        make O=out ARCH=arm64 defconfig

        make -j$(nproc --all) O=out \
        ARCH=arm64 \
        CC=clang \
        LD=ld.lld \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # =========================
    # 📦 Pack AnyKernel3
    # =========================
    - name: 📦 Pack Kernel
      run: |
        git clone https://github.com/osm0sis/AnyKernel3
        cp kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r9 kernel.zip *

    # =========================
    # 🚀 Upload Artifact
    # =========================
    - name: 🚀 Upload
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Build
        path: AnyKernel3/kernel.zip
