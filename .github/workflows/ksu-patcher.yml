name: 🔧 KSU Boot Patcher — Wild Kernel Patcher + SUSFS (No Swap)

on:
  workflow_dispatch:
    inputs:

      boot_img_url:
        description: '🔗 رابط boot.img أو init_boot.img الاستوك (Direct Link)'
        required: true
        type: string

      zip_boot_path:
        description: '📂 مسار الملف جوا الـ ZIP — اتركه فاضي لو رابط مباشر (مثال: images/init_boot.img)'
        required: false
        type: string

      include_susfs_module:
        description: '🛡 Download SUSFS userspace module'
        required: false
        type: boolean
        default: true

      include_zygisk:
        description: '🔀 Download ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false

      include_lsposed:
        description: '🧩 Download LSPosed'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:

    # ────────────────────────────────────────────
    - name: 📥 Download input file
    # ────────────────────────────────────────────
      run: |
        echo "::group::Download Stock Image"
        curl -L --progress-bar "${{ inputs.boot_img_url }}" -o input_file
        echo ""
        ls -lh input_file
        file input_file
        SIZE=$(stat -c%s input_file)
        if [ "$SIZE" -lt 1000000 ]; then
          echo "::error::File too small (${SIZE} bytes) — check your link"
          exit 1
        fi
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 📦 Extract Target Image (Direct / ZIP / Payload.bin)
    # ────────────────────────────────────────────
      run: |
        echo "::group::Extract Target Image"
        FILE_TYPE=$(file input_file)
        echo "File type: $FILE_TYPE"

        mkdir -p extracted_rom

        if echo "$FILE_TYPE" | grep -qi 'zip\|archive'; then
          echo "→ ZIP detected, analyzing contents..."

          if [ -n "${{ inputs.zip_boot_path }}" ]; then
            echo "Using specified path: ${{ inputs.zip_boot_path }}"
            unzip -j input_file "${{ inputs.zip_boot_path }}" -d extracted_rom/ || {
              echo "::error::Path '${{ inputs.zip_boot_path }}' not found in ZIP"
              exit 1
            }
            TARGET_FILE=$(find extracted_rom -name '*.img' | head -1)

          else
            TARGET_PATH=$(unzip -l input_file | awk '{print $4}' | grep -i 'init_boot\.img$' | head -1)
            
            if [ -z "$TARGET_PATH" ]; then
              TARGET_PATH=$(unzip -l input_file | awk '{print $4}' | grep -i 'boot\.img$' | grep -v 'vendor_boot\|recovery\|vbmeta' | head -1)
            fi

            if [ -n "$TARGET_PATH" ]; then
              echo "Found target image inside ZIP at: $TARGET_PATH"
              unzip -j input_file "$TARGET_PATH" -d extracted_rom/
              TARGET_FILE=$(find extracted_rom -name '*.img' | head -1)
            fi
          fi

          if [ -z "$TARGET_FILE" ] || [ ! -s "$TARGET_FILE" ]; then
            PAYLOAD_PATH=$(unzip -l input_file | awk '{print $4}' | grep -i 'payload\.bin$' | head -1)
            
            if [ -n "$PAYLOAD_PATH" ]; then
              echo "💡 Recovery ROM detected (payload.bin found). Extracting image..."
              unzip -j input_file "$PAYLOAD_PATH" -d .
              curl -sL https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz | tar -xvz
              chmod +x payload-dumper-go
              
              ./payload-dumper-go -p init_boot -o extracted_rom payload.bin 2>/dev/null || ./payload-dumper-go -p boot -o extracted_rom payload.bin
              TARGET_FILE=$(find extracted_rom -name '*.img' | head -1)
            fi
          fi

          if [ -z "$TARGET_FILE" ] || [ ! -s "$TARGET_FILE" ]; then
            echo "::error::Cannot find valid boot/init_boot image inside the provided ZIP file."
            exit 1
          fi

          mv "$TARGET_FILE" stock_target.img
          echo "✅ Extracted successfully"

        else
          echo "→ Direct image file provided"
          mv input_file stock_target.img
        fi

        ls -lh stock_target.img
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 🔧 Setup magiskboot & Get Kernel Info
    # ────────────────────────────────────────────
      run: |
        echo "::group::Analyze Stock Kernel"
        set +e

        MAGISK_APK=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | jq -r '.assets[] | select(.name | test("Magisk-v[0-9]")) | .browser_download_url' | head -1)
        curl -sL "$MAGISK_APK" -o magisk.apk
        unzip -jq magisk.apk 'lib/x86_64/libmagiskboot.so' -d .
        mv libmagiskboot.so magiskboot && chmod +x magiskboot

        mkdir -p info_workspace && cp stock_target.img info_workspace/ && cd info_workspace
        ../magiskboot unpack stock_target.img
        
        KERNEL_FILE=$(find . -maxdepth 1 \( -name 'kernel' -o -name 'Image' -o -name 'kernel.gz' \) | head -1)
        
        KERNEL_VER="6.12.30"
        KERNEL_KMI="6.12-android16"
        ANDROID_VER="android16"

        if [ -n "$KERNEL_FILE" ]; then
          ../magiskboot decompress "$KERNEL_FILE" decompressed_k 2>/dev/null
          if [ -s decompressed_k ]; then TARGET_K="decompressed_k"; else TARGET_K="$KERNEL_FILE"; fi
          
          KERNEL_FULL=$(strings "$TARGET_K" | grep -E "Linux version [0-9]+\.[0-9]+" | head -1)
          if [ -z "$KERNEL_FULL" ]; then
            KERNEL_FULL=$(strings "$TARGET_K" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+-android[0-9]+-[0-9]+" | head -1)
          fi
          
          if [ -n "$KERNEL_FULL" ]; then
            KERNEL_VER=$(echo "$KERNEL_FULL" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            KSHORT=$(echo "$KERNEL_VER" | cut -d. -f1,2)
            ANDROID_VER=$(echo "$KERNEL_FULL" | grep -oE "android[0-9]+" | head -1)
            KERNEL_KMI="${KSHORT}-${ANDROID_VER}"
          fi
        fi

        echo "Kernel Version: $KERNEL_VER"
        echo "GKI KMI Match : $KERNEL_KMI"

        echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV
        echo "KERNEL_KMI=$KERNEL_KMI" >> $GITHUB_ENV
        echo "ANDROID_VER=$ANDROID_VER" >> $GITHUB_ENV
        
        cd .. && rm -rf info_workspace
        set -e
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: ⚡ Patch Image using Wild Kernel Patcher (wkp)
    # ────────────────────────────────────────────
      run: |
        echo "::group::Wild Kernel Patcher Execution"
        
        # جلب أحدث إصدار من أداة Wild Kernel Patcher الرسمية
        WKP_RELEASE=$(curl -s "https://api.github.com/repos/ThePhon0/wild-kernel-patcher/releases/latest")
        WKP_TAG=$(echo "$WKP_RELEASE" | jq -r '.tag_name')
        echo "GKI_TAG=$WKP_TAG" >> $GITHUB_ENV

        WKP_URL=$(echo "$WKP_RELEASE" | jq -r '.assets[] | select(.name | test("wkp.*linux.*amd64|wkp-x86_64-unknown-linux-musl")) | .browser_download_url' | head -1)
        if [ -z "$WKP_URL" ] || [ "$WKP_URL" = "null" ]; then
          # Fallback العادي للاسم
          WKP_URL=$(echo "$WKP_RELEASE" | jq -r '.assets[] | select(.name | test("wkp")) | .browser_download_url' | head -1)
        fi

        echo "Downloading Wild Kernel Patcher v$WKP_TAG..."
        curl -L "$WKP_URL" -o wkp && chmod +x wkp

        echo "Running Wild Patcher with KernelSU-Next and SUSFS flags..."
        # أداة wkp بتقوم بحقن الـ KernelSU والـ SUSFS مباشرة وتلقائياً كـ Patch متكامل بدون تبديل ملف الكيرنال بالكامل
        ./wkp patch -i stock_target.img -o ksu_patched_boot.img --ksu-next --susfs
        
        echo ""
        ls -lh ksu_patched_boot.img
        echo "✅ Wild Patching Completed Successfully!"
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 📲 Download Manager APKs
    # ────────────────────────────────────────────
      run: |
        echo "::group::Managers"
        mkdir -p managers
        
        # جلب مانجر KernelSU-Next الرسمي المتوافق مع الباتش
        URL=$(curl -s https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && [ "$URL" != "null" ] \
          && curl -sL "$URL" -o "managers/KernelSU-Next_Manager.apk" && echo "✅ KSUN Manager OK" \
          || echo "⚠️ KSUN Manager not found"
          
        ls -lh managers/
        echo "::endgroup::"

    # ────────────────────────────────────────────
    - name: 🛡 SUSFS Module
      if: inputs.include_susfs_module == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/sidex15/ksu_module_susfs/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && [ "$URL" != "null" ] \
          && curl -sL "$URL" -o modules/ksu_module_susfs.zip && echo "✅ SUSFS Module OK" \
          || echo "⚠️ SUSFS Module not found"

    # ────────────────────────────────────────────
    - name: 🔀 ZygiskNext + Shamiko
      if: inputs.include_zygisk == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        Z=$(curl -s https://api.github.com/repos/Dr-TSNG/ZygiskNext/releases/latest \
          | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        [ -n "$Z" ] && curl -sL "$Z" -o modules/ZygiskNext.zip && echo "✅ ZygiskNext OK"
        S=$(curl -s https://api.github.com/repos/LSPosed/LSPosed.github.io/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ss]hamiko")) | .browser_download_url' | head -1)
        [ -n "$S" ] && curl -sL "$S" -o modules/Shamiko.zip && echo "✅ Shamiko OK"

    # ────────────────────────────────────────────
    - name: 🧩 LSPosed
      if: inputs.include_lsposed == 'true'
    # ────────────────────────────────────────────
      run: |
        set +e
        mkdir -p modules
        URL=$(curl -s https://api.github.com/repos/LSPosed/LSPosed/releases/latest \
          | jq -r '.assets[] | select(.name | test("[Ll][Ss][Pp]osed.*[Zz]ygisk")) | .browser_download_url' | head -1)
        [ -n "$URL" ] && curl -sL "$URL" -o modules/LSPosed.zip && echo "✅ LSPosed OK"

    # ────────────────────────────────────────────
    - name: 📤 Upload — Patched Boot + Managers
    # ────────────────────────────────────────────
      uses: actions/upload-artifact@v4
      with:
        name: Wild-KSU-Patched-[${{ env.KERNEL_KMI }}]
        path: |
          ksu_patched_boot.img
          managers/
        retention-days: 7

    - name: 📤 Upload — Modules
      if: inputs.include_susfs_module == 'true' || inputs.include_zygisk == 'true' || inputs.include_lsposed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Wild-KSU-Modules-Pack
        path: modules/
        retention-days: 7

    # ────────────────────────────────────────────
    - name: 📋 Summary
      if: always()
    # ────────────────────────────────────────────
      run: |
        cat << EOF >> $GITHUB_STEP_SUMMARY
        ## 🔧 KSU Boot Patcher (Wild Kernel Patcher Mode)

        > 🚀 **الباتش الاحترافي الأقوى:** تم تعديل الكيرنال الأصلي لجهازك وحقنه بـ KernelSU-Next ودعم كامل لـ SUSFS بواسطة أداة \`wkp\` الصخرية للحفاظ على كامل تعريفات واستقرار الهاتف وبدون أي ريسك للبوتلوب.

        | البيانات | القيمة المستخرجة الحية |
        |---|---|
        | **Patcher Tool** | Wild Kernel Patcher ($GKI_TAG) |
        | **Kernel Version** | $KERNEL_VER |
        | **Kernel KMI** | $KERNEL_KMI |
        | **Android Base** | $ANDROID_VER |

        ### ⚡ Flash Commands
        \`\`\`bash
        fastboot flash boot ksu_patched_boot.img
        fastboot reboot
        \`\`\`

        ### 🛠️ Module Flash Order
        1. \`ksu_module_susfs.zip\`
        2. \`ZygiskNext.zip\`
        3. \`Shamiko.zip\`
        4. \`LSPosed.zip\`
        5. **عمل ريبوت للموبايل**
        EOF
