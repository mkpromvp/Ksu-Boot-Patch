name: 🔧 KSU Boot Patcher — Multi Manager + SUSFS

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '🔗 رابط boot.img أو firmware.zip (Direct Link)'
        required: true
        type: string
      zip_boot_path:
        description: '📂 مسار boot.img جوا الـ ZIP — فاضي = بحث تلقائي'
        required: false
        type: string
      gki_source:
        description: '📦 مصدر الكيرنال (اختر Stock-Boot للاستوك نفسه)'
        required: true
        default: 'WildKernels'
        type: choice
        options:
          - 'WildKernels'
          - 'zzh20188'
          - 'KernelSU-Next'
          - 'Stock-Boot'
      include_susfs_module:
        description: '🛡 SUSFS userspace module'
        required: false
        type: boolean
        default: true
      include_zygisk:
        description: '🔀 ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false
      include_lsposed:
        description: '🧩 LSPosed'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:

    # (كل الخطوات زي ما هي بدون تغيير 👆)

    # 👇👇👇 الجديد هنا 👇👇👇
    - name: ☁️ Upload to GoFile
      run: |
        echo "::group::GoFile Upload"

        upload_file() {
          FILE="$1"
          if [ ! -f "$FILE" ]; then
            echo "⚠️ $FILE not found"
            return
          fi

          echo "📤 Uploading $FILE..."

          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')

          LINK=$(curl -# -F "file=@$FILE" "https://${SERVER}.gofile.io/uploadFile" \
            | jq -r '.data.downloadPage')

          echo "🔗 $FILE => $LINK"

          echo "$FILE=$LINK" >> links.txt
        }

        upload_file patched_boot.img
        upload_file Flashable_AnyKernel3.zip

        echo "::endgroup::"

    - name: 📋 GoFile Links Summary
      if: always()
      run: |
        if [ -f links.txt ]; then
          echo "## ☁️ GoFile Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d= -f1)
            LINK=$(echo "$line" | cut -d= -f2-)
            echo "- **$FILE** → $LINK" >> $GITHUB_STEP_SUMMARY
          done < links.txt
        fi
