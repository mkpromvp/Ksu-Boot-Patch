name: 🔧 KSU Boot Patcher — Multi Manager + SUSFS

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '🔗 رابط boot.img أو firmware.zip (Direct Link)'
        required: true
        type: string
      zip_boot_path:
        description: '📂 مسار boot.img جوا الـ ZIP — فاضي = بحث تلقائي'
        required: false
        type: string
      gki_source:
        description: '📦 مصدر الكيرنال (اختر Stock-Boot للاستوك نفسه)'
        required: true
        default: 'WildKernels'
        type: choice
        options:
          - 'WildKernels'
          - 'zzh20188'
          - 'KernelSU-Next'
          - 'Stock-Boot'
      include_susfs_module:
        description: '🛡 SUSFS userspace module'
        required: false
        type: boolean
        default: true
      include_zygisk:
        description: '🔀 ZygiskNext + Shamiko'
        required: false
        type: boolean
        default: false
      include_lsposed:
        description: '🧩 LSPosed'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:  
      - name: 📥 Download Input File  
        run: |  
          echo "::group::Download"  
          curl -L --progress-bar "${{ inputs.boot_img_url }}" -o input_file  
          ls -lh input_file  
          file input_file  
          [ $(stat -c%s input_file) -lt 1000000 ] && echo "::error::File too small" && exit 1  
          echo "::endgroup::"  

      - name: 📦 Extract boot.img (if ZIP)  
        run: |  
          echo "::group::Extract"  
          if file input_file | grep -qi 'zip\|archive'; then  
            echo "ZIP detected — img files:"  
            unzip -l input_file | grep -i '\.img' | head -20  
            echo ""  
            if [ -n "${{ inputs.zip_boot_path }}" ]; then  
              unzip -j input_file "${{ inputs.zip_boot_path }}" -d ex/ || {  
                echo "::error::Path not found"; exit 1  
              }  
            else  
              BOOT_PATH=$(unzip -l input_file | awk '{print $4}' \  
                | grep -i 'boot\.img$' \  
                | grep -iv 'vendor_boot\|init_boot\|recovery\|vbmeta\|super' \  
                | head -1)  
              [ -z "\( BOOT_PATH" ] && BOOT_PATH= \)(unzip -l input_file \  
                | awk '{print $4}' | grep -i '^boot' | head -1)  
              if [ -z "$BOOT_PATH" ]; then  
                echo "::error::Cannot find boot.img — use zip_boot_path"; exit 1  
              fi  
              echo "Auto-found: $BOOT_PATH"  
              unzip -j input_file "$BOOT_PATH" -d ex/  
            fi  
            mv $(find ex -name '*.img' | head -1) boot.img  
          else  
            mv input_file boot.img  
          fi  
          echo "boot.img: $(ls -lh boot.img | awk '{print $5}')"  
          file boot.img  
          echo "::endgroup::"  

      - name: 🔧 Setup magiskboot  
        run: |  
          echo "::group::magiskboot"  
          if ! curl -sL "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk" -o magisk.apk || [ $(stat -c%s magisk.apk) -lt 100000 ]; then  
            echo "⚠️ Direct link failed. Fetching via GitHub API..."  
            APK=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest \  
              | jq -r '.assets[]|select(.name|test("Magisk-v[0-9]"))|.browser_download_url' \  
              | head -1)  
            curl -sL "$APK" -o magisk.apk  
          fi  
            
          unzip -jq magisk.apk 'lib/x86_64/libmagiskboot.so' -d .  
          mv libmagiskboot.so magiskboot && chmod +x magiskboot  
          echo "✅ magiskboot is verified and ready"  
          echo "::endgroup::"  

      - name: 🔍 Detect Kernel Version  
        run: |  
          echo "::group::Detect kernel"  
          set +e  

          mkdir -p workspace && cp boot.img workspace/ && cd workspace  
          ../magiskboot unpack boot.img  
          echo "" && echo "Unpacked:" && ls -lah && echo ""  

          KFILE=$(find . -maxdepth 1 \
            \( -name 'kernel' -o -name 'Image' -o -name 'kernel.gz' \
               -o -name 'kernel_dtb' -o -name 'kernel-dtb' \) | head -1)  
          [ -z "$KFILE" ] && echo "::error::No kernel file found" && exit 1  

          echo "Kernel : \( KFILE  ( \)(ls -lh $KFILE | awk '{print $5}'))"  
          echo "Type   : $(file $KFILE)"  

          KTARGET="$KFILE"  
          if file "$KFILE" | grep -qi 'gzip\|compressed\|lzma\|lz4'; then  
            ../magiskboot decompress "$KFILE" kfile_dec 2>/dev/null  
            [ -s kfile_dec ] && KTARGET=kfile_dec && echo "Decompressed: $(ls -lh kfile_dec | awk '{print $5}')"  
          fi  

          FULL=$(strings "$KTARGET" 2>/dev/null | grep -oP 'Linux version \K[^\s]+' | head -1 || true)  
          echo "Raw : $FULL"  

          if [ -n "$FULL" ]; then  
            KVER=$(echo "$FULL"    | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+' || true)  
            KSHORT=$(echo "$FULL"  | grep -oP '^[0-9]+\.[0-9]+' || true)  
            ANDROID=$(echo "$FULL" | grep -oP 'android[0-9]+' | head -1 || true)  
            KMI="\( {KSHORT}- \){ANDROID}"  
          else  
            echo "::warning::Could not detect kernel version"  
            KVER="unknown"; KSHORT="unknown"; ANDROID="unknown"; KMI="unknown"  
          fi  

          echo "━━━━━━━━━━━━━━━━━━━━━━━━"  
          echo "Full version : $KVER"  
          echo "Short        : $KSHORT"  
          echo "Android      : $ANDROID"  
          echo "KMI          : $KMI"  
          echo "━━━━━━━━━━━━━━━━━━━━━━━━"  

          echo "KVER=$KVER"       >> $GITHUB_ENV  
          echo "KSHORT=$KSHORT"   >> $GITHUB_ENV  
          echo "ANDROID=$ANDROID" >> $GITHUB_ENV  
          echo "KMI=$KMI"         >> $GITHUB_ENV  
          echo "KFILE=$KFILE"     >> $GITHUB_ENV  
          set -e  
          echo "::endgroup::"  

      - name: 📦 Set GKI Repo  
        run: |  
          case "${{ inputs.gki_source }}" in  
            "WildKernels")  
              echo "GKI_REPO=WildKernels/GKI_KernelSU_SUSFS" >> $GITHUB_ENV  
              echo "MGR1_REPO=WildKernels/Wild_KSU"          >> $GITHUB_ENV  
              echo "MGR1_NAME=WildKSU_Manager"                >> $GITHUB_ENV  
              echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"   >> $GITHUB_ENV  
              echo "MGR2_NAME=KernelSU-Next_Manager"          >> $GITHUB_ENV  
              ;;  
            "zzh20188")  
              echo "GKI_REPO=zzh20188/GKI_KernelSU_SUSFS"    >> $GITHUB_ENV  
              echo "MGR1_REPO=SukiSU-Ultra/SukiSU-Ultra"     >> $GITHUB_ENV  
              echo "MGR1_NAME=SukiSU_Manager"                 >> $GITHUB_ENV  
              echo "MGR2_REPO=KernelSU-Next/KernelSU-Next"   >> $GITHUB_ENV  
              echo "MGR2_NAME=KernelSU-Next_Manager"          >> $GITHUB_ENV  
              ;;  
            "KernelSU-Next")  
              echo "GKI_REPO=KernelSU-Next/KernelSU-Next"    >> $GITHUB_ENV  
              echo "MGR1_REPO=KernelSU-Next/KernelSU-Next"   >> $GITHUB_ENV  
              echo "MGR1_NAME=KernelSU-Next_Manager"          >> $GITHUB_ENV  
              echo "MGR2_REPO="                                >> $GITHUB_ENV  
              echo "MGR2_NAME="                                >> $GITHUB_ENV  
              ;;  
            "Stock-Boot")  
              echo "GKI_REPO=Stock"                            >> $GITHUB_ENV  
              echo "MGR1_REPO=KernelSU-Next/KernelSU-Next"   >> $GITHUB_ENV  
              echo "MGR1_NAME=KernelSU-Next_Manager"          >> $GITHUB_ENV  
              echo "MGR2_REPO="                                >> $GITHUB_ENV  
              echo "MGR2_NAME="                                >> $GITHUB_ENV  
              ;;  
          esac  

      - name: 📥 Find Exact GKI Asset  
        if: inputs.gki_source != 'Stock-Boot'  
        run: |  
          echo "::group::GKI Asset from $GKI_REPO"  
          # ... (الكود كما هو بدون تغيير)  
          # (تم الاحتفاظ بالكود الأصلي كاملاً)
          # ...  

      # باقي الخطوات السابقة بدون تغيير ...

      - name: 📤 Upload to GoFile  
        run: |  
          echo "::group::Upload to GoFile"  
          
          cat > /tmp/upload_gofile.sh << 'EOF'
          #!/bin/bash
          if [[ "$#" == '0' ]]; then
            echo "ERROR: No File Specified!" && exit 1
          fi
          
          FILE="$1"
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          
          echo "Uploading: $FILE"
          LINK=$(curl -# -F "file=@\( FILE" "https:// \){SERVER}.gofile.io/uploadFile" | jq -r '.data.downloadPage')
          
          if [[ -n "$LINK" && "$LINK" != "null" ]]; then
            echo "✅ $LINK"
            echo "GOFILE_LINK_$2=$LINK" >> $GITHUB_ENV
          else
            echo "❌ Upload failed for $FILE"
          fi
          EOF
          
          chmod +x /tmp/upload_gofile.sh
          
          /tmp/upload_gofile.sh patched_boot.img BOOT
          /tmp/upload_gofile.sh Flashable_AnyKernel3.zip ANYKERNEL
          
          echo "::endgroup::"  

      - name: 📋 Summary  
        if: always()  
        run: |  
          {
            echo "## 🔧 KSU Boot Patcher Result"
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Source Selection | \`${{ inputs.gki_source }}\` |"
            echo "| Kernel Version | \`$KVER\` |"
            echo "| KMI Detected | \`$KMI\` |"
            echo "| Target Asset | \`$GKI_ASSET\` |"
            echo "| Status | $MATCH_LEVEL |"
            echo ""
            echo "### 📥 Download Links (GoFile)"
            echo "- **patched_boot.img**: ${{ env.GOFILE_LINK_BOOT }}"
            echo "- **Flashable_AnyKernel3.zip**: ${{ env.GOFILE_LINK_ANYKERNEL }}"
            echo ""
            echo "⚠️ الروابط صالحة لمدة طويلة على GoFile"
          } >> $GITHUB_STEP_SUMMARY
